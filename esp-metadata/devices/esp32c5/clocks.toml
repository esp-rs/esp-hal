system_clocks = { clock_tree = [
    # High-speed clock sources
    { name = "XTAL_CLK",    type = "source",  values = "40, 48", output = "VALUE * 1_000_000", always_on = true }, # TODO: not user-configurable
    { name = "PLL_CLK",     type = "derived", from = "XTAL_CLK", output = "480_000_000" },
    { name = "RC_FAST_CLK", type = "source",                     output = "20_000_000" },

    # Low-speed clocks
    { name = "XTAL32K_CLK",  type = "source", output = "32768"   },
    { name = "OSC_SLOW_CLK", type = "source", output = "32768"   },
    { name = "RC_SLOW_CLK",  type = "source", output = "130_000" },
    # { name = "EXT32K_CLK",   type = "source", output = "32768" }, # currently unimplemented

    # PLL divider taps
    { name = "PLL_F12M",  type = "generic", output = "PLL_CLK / 40" },
    { name = "PLL_F20M",  type = "generic", output = "PLL_CLK / 24" },
    { name = "PLL_F40M",  type = "generic", output = "PLL_CLK / 12" },
    { name = "PLL_F48M",  type = "generic", output = "PLL_CLK / 10" },
    { name = "PLL_F60M",  type = "generic", output = "PLL_CLK / 8"  },
    { name = "PLL_F80M",  type = "generic", output = "PLL_CLK / 6"  },
    { name = "PLL_F120M", type = "generic", output = "PLL_CLK / 4"  },
    { name = "PLL_F160M", type = "generic", output = "PLL_CLK / 3"  },
    { name = "PLL_F240M", type = "generic", output = "PLL_CLK / 2"  },

    # HP SOC clock root (PCR_SOC_CLK_SEL: XTAL, RC_FAST, PLL_F160M, PLL_F240M)
    { name = "HP_ROOT_CLK", type = "mux", variants = [
        { name = "XTAL",      outputs = "XTAL_CLK" },
        { name = "RC_FAST",   outputs = "RC_FAST_CLK" },
        { name = "PLL_F160M", outputs = "PLL_F160M" },
        { name = "PLL_F240M", outputs = "PLL_F240M" },
    ] },
    # CPU_CLK divider: divider = (CPU_DIV_NUM + 1), n*F_AHB
    { name = "CPU_CLK", type = "generic", params = { divisor = "0..256" }, output = "HP_ROOT_CLK / (divisor + 1)" },

    # AHB_CLK divider: divider = (AHB_DIV_NUM + 1), <= 48MHz
    { name = "AHB_CLK", type = "generic", params = { divisor = "0..256" }, output = "HP_ROOT_CLK / (divisor + 1)" },

    # APB_CLK divider: divider = (APB_DIV_NUM + 1)
    { name = "APB_CLK", type = "generic", params = { divisor = "0..256" }, output = "AHB_CLK / (divisor + 1)" },

    # LP clocks (RTC domain)
    { name = "XTAL_D2_CLK", type = "generic", output = "XTAL_CLK / 2" },
    { name = "LP_FAST_CLK", type = "mux", variants = [
        { name = "RC_FAST", outputs = "RC_FAST_CLK" },
        { name = "XTAL_D2", outputs = "XTAL_D2_CLK" },
        { name = "XTAL",    outputs = "XTAL_CLK" },
    ] },
    { name = "LP_SLOW_CLK", type = "mux", variants = [
        { name = "RC_SLOW",  outputs = "RC_SLOW_CLK" },
        { name = "XTAL32K",  outputs = "XTAL32K_CLK" },
        #{ name = "EXT32K",   outputs = "EXT32K_CLK" },
        { name = "OSC_SLOW", outputs = "OSC_SLOW_CLK" },
    ] },
    
    # Global peripheral-related clocks
    { name = "CRYPTO_CLK", type = "mux", variants = [ # PCR_SEC_CONF
        { name = "XTAL",      outputs = "XTAL_CLK" },
        { name = "FOSC",      outputs = "RC_FAST_CLK" },
        { name = "PLL_F480M", outputs = "PLL_CLK" },
    ] },
    { name = "TIMG_CALIBRATION_CLOCK", type = "mux", variants = [ # PCR_32K_SEL / clk_tg_xtal32k
        { name = "OSC_SLOW_CLK",    outputs = "OSC_SLOW_CLK" },
        { name = "RC_SLOW_CLK",     outputs = "RC_SLOW_CLK" },
        # EXT32K not modeled
        { name = "RC_FAST_DIV_CLK", outputs = "RC_FAST_CLK" },
        { name = "XTAL32K_CLK",     outputs = "XTAL32K_CLK" },
    ] },
], template_groups = [
    { group = "UART", clocks = [
        { name = "FUNCTION_CLOCK", type = "generic", output = "sclk / (div_num + 1)", params = { sclk = [
            { name = "XTAL",     outputs = "XTAL_CLK", default = true },
            { name = "PLL_F80M", outputs = "PLL_F80M" },
            { name = "RC_FAST",  outputs = "RC_FAST_CLK" },
        ], div_num = "0 .. 0x100" } },
        { name = "BAUD_RATE_GENERATOR", type = "generic", output = "(FUNCTION_CLOCK * 16) / (integral * 16 + fractional)", params = { fractional = "0..16", integral = "0..0x1000" } },
    ] },
    { group = "TIMG", clocks = [
        { name = "FUNCTION_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK", default = true },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
            { name = "PLL_F80M",    outputs = "PLL_F80M" },
        ] },
        { name = "WDT_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK", default = true },
            { name = "PLL_F80M",    outputs = "PLL_F80M" },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
        ] },
    ] },
    { group = "RMT", clocks = [
        { name = "SCLK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK" },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
            { name = "PLL_F80M",    outputs = "PLL_F80M", default = true },
        ] },
    ] },
    { group = "PARL_IO", clocks = [
        { name = "RX_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK" },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
            { name = "PLL_F240M",   outputs = "PLL_F240M", default = true },
            # TODO: external clock
        ] },
        { name = "TX_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK" },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
            { name = "PLL_F240M",   outputs = "PLL_F240M", default = true },
        ] },
    ] },
    { group = "I2C", clocks = [
        { name = "FUNCTION_CLOCK", type = "generic", output = "sclk / (div_num + 1)", params = { sclk = [
            { name = "XTAL",    outputs = "XTAL_CLK", default = true },
            { name = "RC_FAST", outputs = "RC_FAST_CLK" },
        ], div_num = "0 .. 0x100" } },
    ] },
    { group = "SPI", clocks = [
        { name = "FUNCTION_CLOCK", type = "mux", variants = [
            { name = "XTAL",      outputs = "XTAL_CLK", default = true },
            { name = "PLL_F160M", outputs = "PLL_F160M" },
            { name = "PLL_F120M", outputs = "PLL_F120M" },
            { name = "RC_FAST",   outputs = "RC_FAST_CLK" },
        ] },
    ] },
] }

peripheral_clocks = { templates = [
    # templates
    { name = "default_clk_en_template", value = "{{control}}::regs().{{conf_register}}().modify(|_, w| w.{{clk_en_field}}().bit(enable));" },
    { name = "clk_en_template", value = "{{default_clk_en_template}}" },
    { name = "rst_template", value = "{{control}}::regs().{{conf_register}}().modify(|_, w| w.{{rst_field}}().bit(reset));" },
    # substitutions
    { name = "control", value = "crate::peripherals::SYSTEM" },
    { name = "conf_register", value = "{{peripheral}}_conf" },
    { name = "clk_en_field", value = "{{peripheral}}_clk_en" },
    { name = "rst_field", value = "{{peripheral}}_rst_en" },
], peripheral_clocks = [
    { name = "Uart0", template_params = { conf_register = "uart(0).conf", clk_en_field = "clk_en", rst_field = "rst_en" }, keep_enabled = true},
    { name = "Uart1", template_params = { conf_register = "uart(1).conf", clk_en_field = "clk_en", rst_field = "rst_en" } },
    { name = "Timg0", template_params = { conf_register = "timergroup(0).conf", clk_en_field = "clk_en", rst_field = "rst_en" }, keep_enabled = true },
    { name = "Timg1", template_params = { conf_register = "timergroup(1).conf", clk_en_field = "clk_en", rst_field = "rst_en" } },
    { name = "I2cExt0", template_params = { peripheral = "i2c0" } },
    { name = "I2s0", template_params = { peripheral = "i2s" } },
    { name = "Pcnt" },
    { name = "Rmt" },
    { name = "Systimer", keep_enabled = true }, # can be clocked from XTAL_CLK or RC_FAST_CLK, the latter has no divider?
    { name = "ApbSarAdc", template_params = { peripheral = "saradc", clk_en_field = "saradc_reg_clk_en", rst_field = "saradc_reg_rst_en" }, keep_enabled = true },
    { name = "ParlIo", template_params = { clk_en_field = "parl_clk_en", rst_field = "parl_rst_en" } },
    { name = "AhbGdma", template_params = { peripheral = "gdma" } },
    { name = "Uhci0", template_params = { peripheral = "uhci" } },
    { name = "Spi2" },
    { name = "Aes" },
    { name = "Sha" },
    { name = "Rsa" },
    { name = "Ecc" },
    { name = "UsbDevice", keep_enabled = true },
] }
