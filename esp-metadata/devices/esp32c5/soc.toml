    { name = "UART1", interrupts = { peri = "UART1" }, stable = true, clock_group = "UART" },
    { name = "UHCI0" },
    { name = "USB_DEVICE", interrupts = { peri = "USB_DEVICE" } },

    { name = "ADC1", virtual = true },

    { name = "BT", virtual = true, interrupts = { mac = "BT_MAC", lp_timer = "LP_TIMER" } },
    { name = "FLASH", virtual = true },
    { name = "GPIO_DEDICATED", virtual = true },
    { name = "LP_CORE", virtual = true },
    { name = "SW_INTERRUPT", virtual = true },
    { name = "WIFI", virtual = true, interrupts = { bb = "WIFI_BB", mac = "WIFI_MAC", pwr = "WIFI_PWR" }, stable = true },
    { name = "PSRAM", virtual = true },
]

[device.soc.clocks]
# {include clocks.toml}

[device.adc]
support_status = "partial"
instances = [{ name = "adc1" }]

# TODO: define functionality for PSEUDO register
[device.aes]
support_status = "partial"
has_split_text_registers = true
endianness_configurable = false
dma_mode = ["ECB", "CBC", "OFB", "CTR", "CFB8", "CFB128"]
key_length = { options = [
    { bits = 128, encrypt_mode = 0, decrypt_mode = 4 },
    { bits = 256, encrypt_mode = 2, decrypt_mode = 6 }
] }

[device.dma]
support_status = "partial"
gdma_version = 2
separate_in_out_interrupts = true
can_access_psram = true
# TODO: DMA can access flash
# TODO: weight-based arbitration
engines = [
    {
        name = "AHB_GDMA",
        max_priority = 5,
        drivers = ["aes", "sha", "spi_master", "uhci", "i2s", "parl_io"],
        peripheral_instances = [
            { name = "SPI2", dma_id = 1 },
            { name = "UHCI0", dma_id = 2 },
            { name = "I2S0", dma_id = 3 },
            { name = "AES", dma_id = 6 },
            { name = "SHA", dma_id = 7 },
            { name = "APB_SARADC", dma_id = 8 },
            { name = "PARL_IO", dma_id = 9 },
        ],
        channels = [
            { name = "DMA_CH0", mem2mem = true, mem2mem_id = 4, interrupt_in = "DMA_IN_CH0", interrupt_out = "DMA_OUT_CH0" },
            { name = "DMA_CH1", mem2mem = true, mem2mem_id = 5, interrupt_in = "DMA_IN_CH1", interrupt_out = "DMA_OUT_CH1" },
            { name = "DMA_CH2", mem2mem = true, mem2mem_id = 10, interrupt_in = "DMA_IN_CH2", interrupt_out = "DMA_OUT_CH2" },
        ]
    },
]

[device.ecc]
support_status = "partial"
working_modes = [
    { id = 0, mode = "affine_point_multiplication" },
    { id = 2, mode = "affine_point_verification" },
    { id = 3, mode = "affine_point_verification_and_multiplication" },
    { id = 4, mode = "jacobian_point_multiplication" },
    { id = 5, mode = "affine_point_addition" },
    { id = 6, mode = "jacobian_point_verification" },
    { id = 7, mode = "affine_point_verification_and_jacobian_point_multiplication" },
    { id = 8, mode = "modular_addition" },
    { id = 9, mode = "modular_subtraction" },
    { id = 10, mode = "modular_multiplication" },
    { id = 11, mode = "modular_division" }
]
curves = [
    { id = 0, curve = 192 },
    { id = 1, curve = 256 },
    { id = 2, curve = 384 }
]
separate_jacobian_point_memory = true
has_memory_clock_gate = true
supports_enhanced_security = true

[device.gpio]
version = 2
has_input_sync = true
support_status = "partial"
gpio_function = 1
constant_0_input = 0x60
constant_1_input = 0x40
pins = [
    { pin =  0,                                                                              analog = { 0 = "XTAL_32K_P" },                 lp = { 0 = "LP_UART_DTRN",    1 = "LP_GPIO0" } },
    { pin =  1,                                                                              analog = { 0 = "XTAL_32K_N", 1 = "ADC1_CH0" }, lp = { 0 = "LP_UART_DSRN",    1 = "LP_GPIO1" } },
    { pin =  2,  functions = { 0 = "MTMS",       2 = "FSPIQ" }, limitations = ["strapping"], analog = {                   1 = "ADC1_CH1" }, lp = { 0 = "LP_UART_RTSN",    1 = "LP_GPIO2", 3 = "LP_I2C_SDA" } },
    { pin =  3,  functions = { 0 = "MTDI" },                    limitations = ["strapping"], analog = {                   1 = "ADC1_CH2" }, lp = { 0 = "LP_UART_CTSN",    1 = "LP_GPIO3", 3 = "LP_I2C_SCL" } },
    { pin =  4,  functions = { 0 = "MTCK",       2 = "FSPIHD" },                             analog = {                   1 = "ADC1_CH3" }, lp = { 0 = "LP_UART_RXD_PAD", 1 = "LP_GPIO4" } },
    { pin =  5,  functions = { 0 = "MTDO",       2 = "FSPIWP" },                             analog = {                   1 = "ADC1_CH4" }, lp = { 0 = "LP_UART_TXD_PAD", 1 = "LP_GPIO5" } },
    { pin =  6,  functions = {                   2 = "FSPICLK" },                            analog = {                   1 = "ADC1_CH5" }, lp = {                        1 = "LP_GPIO6" } },
    { pin =  7,  functions = { 0 = "SDIO_DATA1", 2 = "FSPID" }, limitations = ["strapping"] },
