# ESP32-C5 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-chip-support-table` to
# update the table in the esp-hal README.

[device]
name   = "esp32c5"
arch   = "riscv"
target = "riscv32imac-unknown-none-elf"
cores  = 1
trm    = "https://www.espressif.com/sites/default/files/documentation/esp32-c5_technical_reference_manual_en.pdf"

symbols = [
    # Additional peripherals defined by us (the developers):
    # "lp_core",

    # ROM capabilities
    "rom_crc_le",
    "rom_crc_be",
    "rom_md5_bsd",
]

[device.soc]
cpu_has_branch_predictor = true
cpu_has_csr_pc = false
cpu_csr_prv_mode = 0x810

memory_map = { ranges = [
    { name = "dram", start = 0x4080_0000, end = 0x4086_0000 },
    # start address from correct bootloader commit: https://github.com/espressif/esp-idf/blob/d66ebb8/components/bootloader/subproject/main/ld/esp32c5/bootloader.ld#L32
    { name = "dram2_uninit", start = 0x4084_E5A0, end = 0x4085_E5A0 },
] }

peripherals = [
    { name = "AES", interrupts = { peri = "AES" } },
    { name = "ASSIST_DEBUG" },
    { name = "APB_SARADC" },
    # { name = "AVC" },
    # { name = "BITSCRAMBLER" },
    { name = "CACHE" },
    { name = "CLINT" },
    # { name = "CPU_APM" }, # TODO: verify we need it
    { name = "DMA" },
    { name = "DS" },
    { name = "ECC" },
    { name = "ECDSA" },
    { name = "EFUSE", hidden = true },
    { name = "ETM", pac = "SOC_ETM" },
    { name = "GPIO" },
    { name = "GPIO_SD", pac = "GPIO_EXT" },
    # { name = "HINF" },
    { name = "HMAC" },
    { name = "HP_APM" },
    { name = "HP_SYS" },
    { name = "HUK" },
    { name = "I2C_ANA_MST" },
    { name = "I2C0", interrupts = { peri = "I2C_EXT0" }, stable = true, clock_group = "I2C" },
    { name = "I2S0", interrupts = { peri = "I2S0" } },
    { name = "IEEE802154", interrupts = { mac = "ZB_MAC" } },
    { name = "INTERRUPT_CORE0" },
    { name = "INTPRI" },
    { name = "IO_MUX" },
    { name = "KEYMNG" },
    # { name = "LEDC" }, # TODO: define later
    { name = "LP_ANA" },
    { name = "LP_AON" },
    # { name = "LP_APM" },
    { name = "LP_APM0" },
    { name = "LP_CLKRST" },
    # { name = "LP_GPIO" }, # TODO: rename LP_IO?
    # { name = "LP_I2C0" },
    { name = "LP_I2C_ANA_MST" },
    { name = "LP_IO_MUX" },
    { name = "LP_PERI", pac = "LPPERI" },
    { name = "LP_TEE" },
    { name = "LP_TIMER" },
    { name = "LP_UART" },
    { name = "LP_WDT" },
    { name = "LPWR", pac = "LP_CLKRST" },
    { name = "MCPWM0" },
    { name = "MEM_MONITOR" },
    { name = "MODEM_LPCON" },
    { name = "MODEM_SYSCON" },
    # { name = "MODEM0" },
    # { name = "MODEM1" },
    # { name = "MODEM_PWR0" },
    # { name = "MODEM_PWR1" },
    # { name = "OTP_DEBUG" },
    { name = "PARL_IO", interrupts = { tx = "PARL_IO_TX", rx = "PARL_IO_RX" }, clock_group = "PARL_IO" },
    { name = "PAU" },
    { name = "PCNT" },
    { name = "PCR" },
    { name = "PMU" },
    # { name = "PSRAM_MEM_MONITOR" },
    { name = "PVT_MONITOR", pac = "PVT" },
    { name = "RMT", clock_group = "RMT" },
    { name = "RNG", pac = "LPPERI" },
    { name = "RSA", interrupts = { peri = "RSA" } },
    { name = "SHA", interrupts = { peri = "SHA" } },
    { name = "SLC" },
    # { name = "SLCHOST" }, TODO: add PAC manually later
    { name = "SPI0" },
    { name = "SPI1" },
    { name = "SPI2", interrupts = { peri = "SPI2" }, stable = true, clock_group = "SPI" },
    { name = "SYSTEM", pac = "PCR" },
    { name = "SYSTIMER" },
