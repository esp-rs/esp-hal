# ESP32-P4 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32p4"
arch   = "riscv"
target = "riscv32imafc-unknown-none-elf"
cores  = 2
trm   = "https://www.espressif.com/sites/default/files/documentation/esp32-p4_technical_reference_manual_en.pdf"

symbols = [
    # Additional peripherals defined by us (the developers):
    "spi_octal",

    # ROM capabilities
    "rom_crc_le",
    "rom_crc_be",
    "rom_md5_bsd",

    # Wakeup SOC based on ESP-IDF:
    "pm_support_ext1_wakeup",
    "pm_support_touch_sensor_wakeup",

    # TODO: add the following symbols when investigation and getting ready
    #   - "lp_core"
    #   - "swd"
    #   - "gpio_support_deepsleep_wakeup"
    #   - "uart_support_wakeup_int"
]

[device.interrupts]
support_status = "partial"
status_registers = 5
software_interrupt_count = 4
software_interrupt_delay = 24
# ESP32-P4 uses CLIC with 48 interrupt lines (TRM v0.5, Ch 14)
controller = { Riscv = { flavour = "clic", interrupts = 48, priority_levels = 8 } }

# TODO: align with newer TRM revisions after v0.5. The v0.5 TRM still has
# the following sections incomplete:
# - Bus Architecture
# - Processor Instruction Extensions
# - AXI Performance Monitor
# - MIPI DSI (CAM)
# - I3C

[device.soc]
cpu_has_branch_predictor = true
multi_core_enabled = true
cpu_has_csr_pc = false
internal_memory_cached = true

# HP L2MEM: 0x4FF0_0000 - 0x4FFC_0000 (768 KB)
# ROM bootloader reserves 0x4FF0_0000 - 0x4FF4_0000 (256 KB)
# dram: usable application RAM (after ROM reserved region)
# dram2_uninit: ROM reserved area, reclaimable after 2nd-stage bootloader
memory_map = { ranges = [
    { name = "dram", start = 0x4FF4_0000, end = 0x4FFC_0000 },
    { name = "dram2_uninit", start = 0x4FF0_0000, end = 0x4FF4_0000 },
] }

peripherals = [
    # Minimal set for esp-hal compilation
    { name = "EFUSE", hidden = true },
    { name = "GPIO" },
    { name = "SYSTEM", pac = "HP_SYS" },
    { name = "HP_SYS" },
    { name = "HP_SYS_CLKRST" },
    { name = "RNG", pac = "LP_SYS" },
    { name = "INTERRUPT_CORE0" },
    { name = "INTERRUPT_CORE1" },
    { name = "LP_I2C_ANA_MST" },
    { name = "CLIC" },
    { name = "IO_MUX" },
    # LP_AON / LPWR: compatibility aliases -- other chips expose an `LP_AON`
    # (and the `LPWR` alias) register block; on P4 the same registers live in
    # `LP_SYS` in the PAC, so we point the esp-hal `LP_AON` / `LPWR` singletons
    # at the `LP_SYS` PAC type.
    { name = "LP_AON", pac = "LP_SYS" },
    { name = "LP_AON_CLKRST" },
    { name = "LP_SYS" },
    { name = "LP_WDT" },
    { name = "LPWR", pac = "LP_SYS" },
    { name = "PMU" },
    { name = "SYSTIMER" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "TIMG1", clock_group = "TIMG" },
    { name = "UART0", interrupts = { peri = "UART0" }, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, clock_group = "UART" },
    { name = "UART2", interrupts = { peri = "UART2" }, clock_group = "UART" },
    { name = "UART3", interrupts = { peri = "UART3" }, clock_group = "UART" },
    { name = "UART4", interrupts = { peri = "UART4" }, clock_group = "UART" },
    { name = "SPI2", interrupts = { peri = "SPI2" }, stable = true, clock_group = "SPI" },
    { name = "SPI3", interrupts = { peri = "SPI3" }, stable = true, clock_group = "SPI" },
    { name = "I2C0", interrupts = { peri = "I2C0" }, clock_group = "I2C" },
    { name = "I2C1", interrupts = { peri = "I2C1" }, clock_group = "I2C" },
    { name = "TWAI0", interrupts = { peri = "TWAI0" } },
    { name = "TWAI1", interrupts = { peri = "TWAI1" } },
    { name = "TWAI2", interrupts = { peri = "TWAI2" } },
    { name = "PSRAM", virtual = true },
    # DMA: P4 has three DMA blocks; see [device.dma] below for the table.
    # esp-hal's `Dma` singleton needs the GDMA v2 layout, so map it to AHB_DMA.
    { name = "DMA", pac = "AHB_DMA" },
    { name = "AXI_GDMA", pac = "AXI_DMA" },

    { name = "ETH", virtual = true },
    { name = "EMAC_DMA", hidden = true },
    { name = "EMAC_MAC", hidden = true },
    { name = "MIPI_DSI", virtual = true, interrupts = { dsi = "DSI", bridge = "DSI_BRIDGE" }, clock_group = "MIPI_DSI" },
    { name = "VDMA", pac = "DMA", hidden = true },
    { name = "MIPI_DSI_HOST", hidden = true },
    { name = "MIPI_DSI_BRIDGE", hidden = true },
    { name = "USB_DEVICE", interrupts = { peri = "USB_DEVICE" } },
    { name = "SDHOST" },
    { name = "LEDC", interrupts = { peri = "LEDC" } },
    { name = "MCPWM0", interrupts = { peri = "PWM0" } },
    { name = "MCPWM1", interrupts = { peri = "PWM1" } },
    { name = "PCNT", interrupts = { peri = "PCNT" } },
    { name = "RMT", interrupts = { peri = "RMT" } },
    { name = "ADC" },
    { name = "AES", interrupts = { peri = "AES" } },
    { name = "SHA", interrupts = { peri = "SHA" } },
    { name = "RSA", interrupts = { peri = "RSA" } },
    { name = "ECC", interrupts = { peri = "ECC" } },
    { name = "USB_FS", interrupts = { peri = "USB_FS" } },
    { name = "USB_HS", interrupts = { peri = "USB_HS" } },
    { name = "USB_WRAP", hidden = true },

    { name = "SW_INTERRUPT", virtual = true },
    { name = "CPU_CTRL", virtual = true },
]

[device.soc.clocks]
# {include clocks.toml}

# UART: 5 instances (UART0-4), 128-byte FIFO
[device.uart]
support_status = "partial"
instances = [
    { name = "uart0", sys_instance = "Uart0", tx = "UART0_TXD", rx = "UART0_RXD", cts = "UART0_CTS", rts = "UART0_RTS" },
    { name = "uart1", sys_instance = "Uart1", tx = "UART1_TXD", rx = "UART1_RXD", cts = "UART1_CTS", rts = "UART1_RTS" },
    { name = "uart2", sys_instance = "Uart2", tx = "UART2_TXD", rx = "UART2_RXD", cts = "UART2_CTS", rts = "UART2_RTS" },
    { name = "uart3", sys_instance = "Uart3", tx = "UART3_TXD", rx = "UART3_RXD", cts = "UART3_CTS", rts = "UART3_RTS" },
    { name = "uart4", sys_instance = "Uart4", tx = "UART4_TXD", rx = "UART4_RXD", cts = "UART4_CTS", rts = "UART4_RTS" },
]
ram_size = 128
version = 2

# SYSTIMER: 2 counter units, 3 alarm comparators, 16 MHz (XTAL/2.5)
# PAC register names verified: unit_op(n), unit_value(n), target_conf(n),
# trgt(n), comp_load(n) all match esp-hal systimer module expectations.
[device.systimer]

# GP Timer (TIMG): 2 groups, each with 2 timers + WDT
[device.timergroup]
support_status = "partial"
instances = [
    { name = "timg0" },
    { name = "timg1" },
]
timg_has_divcnt_rst = true

# SPI Master: 2 instances (GPSPI2, GPSPI3)
# SPI Master: SPI2 only (SPI2 and SPI3 have different PAC RegisterBlock types)
[device.spi_master]
version = 3
fifo_size = 64
support_status = "partial"
instances = [
    { name = "spi2", sys_instance = "Spi2", sclk = "SPI2_CK", sio = ["SPI2_D", "SPI2_Q", "SPI2_WP", "SPI2_HOLD"], cs = ["SPI2_CS"] },
    { name = "spi3", sys_instance = "Spi3", sclk = "SPI3_CK", sio = ["SPI3_D", "SPI3_Q", "SPI3_WP", "SPI3_HOLD"], cs = ["SPI3_CS", "SPI3_CS1", "SPI3_CS2"] },
]

# I2C Master: 2 instances
# P4 PAC: data register is read-only, TX uses txfifo_start_addr (fixed in i2c/master/mod.rs)
[device.i2c_master]
support_status = "partial"
version = 3
instances = [
    { name = "i2c0", sys_instance = "I2c0", scl = "I2C0_SCL", sda = "I2C0_SDA" },
    { name = "i2c1", sys_instance = "I2c1", scl = "I2C1_SCL", sda = "I2C1_SDA" },
]
has_fsm_timeouts = true
has_hw_bus_clear = true
ll_intr_mask = 0x3ffff
fifo_size = 32
has_bus_timeout_enable = true
max_bus_timeout = 0x1F
has_arbitration_en = true

# DMA: P4 exposes three DMA controllers. IDF public docs
# (https://docs.espressif.com/projects/esp-idf/en/stable/esp32p4/api-reference/system/async_memcpy.html)
# refer to them as GDMA-AHB and GDMA-AXI:
#   AHB_DMA / GDMA-AHB (0x50085000): GDMA v2 layout -- used by esp-hal as `Dma`
#   AXI_DMA / GDMA-AXI (0x5008A000): AXI-bus DMA, different layout
#   DMA (separate block at 0x50081000, SOC_DW_GDMA_SUPPORTED):
#     another register layout, not used by esp-hal
# esp-hal's `Dma` singleton must be GDMA v2 compatible, hence PAC alias AHB_DMA above.
# Ref: IDF linker esp32p4.peripherals.ld (AHB_DMA, AXI_DMA, DW_GDMA symbols).
[device.dma]
support_status = "partial"
gdma_version = 2
separate_in_out_interrupts = true
engines = [
    {
        name = "AHB_GDMA",
        max_priority = 5,
        burst_sizes = [0, 4, 16, 32], # unclear if 64 byte (INCR16) is supported
        drivers = [],
        peripheral_instances = [
            # I3C, UHCI, I2S, ADC, RMT
        ],
        channels = [
            { name = "DMA_CH0", interrupt_in = "AHB_PDMA_IN_CH0", interrupt_out = "AHB_PDMA_OUT_CH0" },
            { name = "DMA_CH1", mem2mem = true, mem2mem_id = 11, interrupt_in = "AHB_PDMA_IN_CH1", interrupt_out = "AHB_PDMA_OUT_CH1" },
            { name = "DMA_CH2", mem2mem = true, mem2mem_id = 12, interrupt_in = "AHB_PDMA_IN_CH2", interrupt_out = "AHB_PDMA_OUT_CH2" },
        ]
    },
    {
        name = "AXI_GDMA",
        max_priority = 5,
        burst_sizes = [8, 16, 32, 64, 128],
        drivers = ["aes", "sha", "spi_master"],
        peripheral_instances = [
            # LCD_CAM
            { name = "SPI2", dma_id = 1 },
            { name = "SPI3", dma_id = 2 },
            # PARL_IO
            { name = "AES",  dma_id = 4 },
            { name = "SHA",  dma_id = 5 },
        ],
        channels = [
            { name = "DMA_AXI_CH0", mem2mem = true, mem2mem_id = 6, interrupt_in = "AXI_PDMA_IN_CH0", interrupt_out = "AXI_PDMA_OUT_CH0" },
            { name = "DMA_AXI_CH1", mem2mem = true, mem2mem_id = 7, interrupt_in = "AXI_PDMA_IN_CH1", interrupt_out = "AXI_PDMA_OUT_CH1" },
            { name = "DMA_AXI_CH2", mem2mem = true, mem2mem_id = 8, interrupt_in = "AXI_PDMA_IN_CH2", interrupt_out = "AXI_PDMA_OUT_CH2" },
        ]
    },
    # DW-GDMA / VDMA: used for MIPI-DSI video streaming (mem → DSI bridge FIFO).
    # All 4 channels share the single DMA interrupt; interrupt binding is managed
    # by the MIPI-DSI driver directly rather than through the standard DMA traits.
    {
        name = "VDMA",
        drivers = ["mipi_dsi"],
        peripheral_instances = [],
        channels = [
            { name = "VDMA_CH0" },
            { name = "VDMA_CH1" },
            { name = "VDMA_CH2" },
            { name = "VDMA_CH3" },
        ]
    },
]

