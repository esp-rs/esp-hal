# ESP32-C2 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32c2"
arch   = "riscv"
target = "riscv32imc-unknown-none-elf"
cores  = 1
datasheet = "https://www.espressif.com/sites/default/files/documentation/esp8684_datasheet_en.pdf"
trm    = "https://www.espressif.com/sites/default/files/documentation/esp8684_technical_reference_manual_en.pdf"

[device.rom]
has_crc_le      = true
has_crc_be      = true
has_md5_mbedtls = true

[device.soc]
cpu_has_csr_pc = true
cpu_mcause_mask = 0x1f
has_swd_watchdog = true

memory_map = { ranges = [
    { name = "dram", start = 0x3FCA_0000, end = 0x3FCE_0000 },
    { name = "dram2_uninit", start = 0x3FCC_E800, end = 0x3FCD_EB70 },
] }

peripherals = [
    { name = "APB_CTRL" },
    { name = "APB_SARADC" },
    { name = "BB" },
    { name = "ASSIST_DEBUG" },
    { name = "DMA" },
    { name = "ECC" },
    { name = "EFUSE", hidden = true },
    { name = "EXTMEM" },
    { name = "MMU_TABLE", hidden = true },
    { name = "GPIO" },
    { name = "I2C_ANA_MST" },
    { name = "I2C0", interrupts = { peri = "I2C_EXT0" }, stable = true, clock_group = "I2C" },
    { name = "INTERRUPT_CORE0" },
    { name = "IO_MUX" },
    { name = "LEDC" },
    { name = "RNG" },
    { name = "LPWR", pac = "RTC_CNTL" },
    { name = "RTC_TIMER", pac = "RTC_CNTL" },
    { name = "MODEM_CLKRST" },
    { name = "SENSITIVE" },
    { name = "SHA", interrupts = { peri = "SHA" } },
    { name = "SPI0" },
    { name = "SPI1" },
    { name = "SPI2", interrupts = { peri = "SPI2" }, stable = true, clock_group = "SPI" },
    { name = "SYSTEM" },
    { name = "SYSTIMER" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "UART0", interrupts = { peri = "UART0" }, stable = true, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, stable = true, clock_group = "UART" },
    { name = "XTS_AES" },

    { name = "ADC1", virtual = true },
    { name = "BT", virtual = true, interrupts = { mac = "BT_MAC", lp_timer = "LP_TIMER" } },
    { name = "FLASH", virtual = true },
    { name = "GPIO_DEDICATED", virtual = true },
    { name = "SW_INTERRUPT", virtual = true },
    { name = "WIFI", virtual = true, interrupts = { mac = "WIFI_MAC", pwr = "WIFI_PWR" }, stable = true },
]

[device.soc.clocks]
# {include clocks.toml}

[device.adc]
support_status = "partial"
instances = [
    { name = "adc1" },
]

[device.assist_debug]
support_status = "partial"
has_sp_monitor = true

[device.dma]
support_status = "partial"
gdma_version = 1
engines = [
    {
        name = "AHB_GDMA",
        internal_ram_burst_sizes = [0, 4],
        max_priority = 9,
        drivers = ["sha", "spi_master", "spi_slave"],
        peripheral_instances = [
            { name = "SPI2", dma_id = 0 },
            { name = "SHA", dma_id = 7 },
        ],
        channels = [
            { name = "DMA_CH0", mem2mem = true, mem2mem_id = 2, interrupt = "DMA_CH0" }, # 2 is UHCI - not supported on chip, but DMA peripheral exists
        ]
    },
]

[device.ecc]
support_status = "partial"
working_modes = [
    { id = 0, mode = "affine_point_multiplication" },
    { id = 1, mode = "finite_field_division" },
    { id = 2, mode = "affine_point_verification" },
    { id = 3, mode = "affine_point_verification_and_multiplication" },
    { id = 4, mode = "jacobian_point_multiplication" },
    { id = 6, mode = "jacobian_point_verification" },
    { id = 7, mode = "affine_point_verification_and_jacobian_point_multiplication" }
]
curves = [
    { id = 0, curve = 192 },
    { id = 1, curve = 256 }
]
zero_extend_writes = true

[device.lp_io]
support_status = "partial"
version = "v3"

[device.gpio]
support_status = "supported"
# {include gpio.toml}

[device.dedicated_gpio]
version = "riscv_v1"
support_status = "partial"
channels = [["CPU_GPIO_0", "CPU_GPIO_1", "CPU_GPIO_2", "CPU_GPIO_3", "CPU_GPIO_4", "CPU_GPIO_5", "CPU_GPIO_6", "CPU_GPIO_7"]]

[device.i2c_master]
support_status = "supported"
version = 3
instances = [
    { name = "i2c0", sys_instance = "I2cExt0", scl = "I2CEXT0_SCL", sda = "I2CEXT0_SDA" },
]
has_fsm_timeouts = true
has_hw_bus_clear = true
ll_intr_mask = 0x3ffff
fifo_size = 16
has_bus_timeout_enable = true
max_bus_timeout = 0x1F
has_conf_update = true
has_arbitration_en = true
has_tx_fifo_watermark = true
bus_timeout_is_exponential = true
has_pd_en = true

[device.interrupts]
support_status = "partial"
status_registers = 2
software_interrupt_count = 4
controller = { Riscv = { flavour = "basic", interrupts = 32, priority_levels = 15 } }

[device.sha]
support_status = "partial"
algo = { sha1 = 0, sha224 = 1, sha256 = 2 }

[device.spi_master]
version = 3
fifo_size = 64
support_status = "supported"
has_app_interrupts = true
has_dma_segmented_transfer = true
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        sio = ["FSPID", "FSPIQ", "FSPIWP", "FSPIHD"],
        cs = ["FSPICS0", "FSPICS1", "FSPICS2", "FSPICS3", "FSPICS4", "FSPICS5"]
    },
]

[device.spi_slave]
support_status = "partial"
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        mosi = "FSPID",
        miso = "FSPIQ",
        cs = "FSPICS0"
    },
]

[device.timergroup]
support_status = "partial"
instances = [{ name = "timg0" }]
timg_has_divcnt_rst = true

[device.uart]
support_status = "supported"
instances = [
    { name = "uart0", sys_instance = "Uart0", tx = "U0TXD", rx = "U0RXD", cts = "U0CTS", rts = "U0RTS" },
    { name = "uart1", sys_instance = "Uart1", tx = "U1TXD", rx = "U1RXD", cts = "U1CTS", rts = "U1RTS" },
]
ram_size = 128
version = 1
has_sclk_divider = true
has_sclk_enable = true

[device.rng]
support_status = "partial"
trng_supported = true
apb_cycle_wait_num = 16 # TODO

[device.sleep]
support_status = "partial"
light_sleep = true
deep_sleep = true
wakeup_sources = {
    Gpio = 2,
    Timer = 3,
    Sdio = 4,
    Wifi = 5,
    Uart0 = 6,
    Uart1 = 7,
    Touch = 8,
    Ulp = 9,
    Bt = 10,
}

# Other drivers which are partially supported but have no other configuration:

## Crypto
# [device.aes] Product portfolio lists AES, but TRM only has XTS_AES?

## Interfaces
[device.ledc]
version = 2
channel_count = 6

## Miscellaneous
[device.io_mux]
[device.temp_sensor]
[device.systimer]
[device.lp_timer]

## Radio
[device.wifi]
mac_version = 1

[device.bt]
support_status = "partial"
controller = "npl"

[device.phy]
combo_module = true
