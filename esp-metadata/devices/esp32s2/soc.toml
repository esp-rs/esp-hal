# ESP32-S2 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32s2"
arch   = "xtensa"
target = "xtensa-esp32s2-none-elf"
cores  = 1
datasheet = "https://www.espressif.com/sites/default/files/documentation/esp32-s2_datasheet_en.pdf"
trm    = "https://www.espressif.com/sites/default/files/documentation/esp32-s2_technical_reference_manual_en.pdf"

[device.rom]
has_crc_le  = true
has_md5_bsd = true

[device.soc]
memory_map = { ranges = [
    { name = "dram", start = 0x3FFB_0000, end = 0x4000_0000 },
    { name = "dram2_uninit", start = 0x3FFD_E000, end = 0x4000_0000 },
] }
has_swd_watchdog = true

peripherals = [
    { name = "AES", interrupts = { peri = "AES" } },
    { name = "APB_SARADC" },
    { name = "DEDICATED_GPIO" },
    { name = "DS" },
    { name = "EFUSE", hidden = true },
    { name = "EXTMEM" },
    { name = "MMU_TABLE", hidden = true },
    { name = "FE" },
    { name = "FE2" },
    { name = "GPIO" },
    { name = "GPIO_SD" },
    { name = "HMAC" },
    { name = "I2C_ANA_MST" },
    { name = "I2C0", interrupts = { peri = "I2C_EXT0" }, stable = true, clock_group = "I2C" },
    { name = "I2C1", interrupts = { peri = "I2C_EXT1" }, stable = true, clock_group = "I2C" },
    { name = "I2S0", interrupts = { peri = "I2S0" } },
    { name = "INTERRUPT_CORE0" },
    { name = "IO_MUX" },
    { name = "LEDC" },
    { name = "NRX" },
    { name = "PCNT" },
    { name = "PMS" },
    { name = "RMT", clock_group = "RMT" },
    { name = "RNG" },
    { name = "RSA", interrupts = { peri = "RSA" } },
    { name = "LPWR", pac = "RTC_CNTL" },
    { name = "RTC_TIMER", pac = "RTC_CNTL" },
    { name = "RTC_I2C" },
    { name = "RTC_IO" },
    { name = "SENS" },
    { name = "SHA", interrupts = { peri = "SHA" } },
    { name = "SPI0" },
    { name = "SPI1" },
    { name = "SPI2", interrupts = { peri = "SPI2", dma = "SPI2_DMA" }, stable = true, clock_group = "SPI" },
    { name = "SPI3", interrupts = { peri = "SPI3", dma = "SPI3_DMA" }, stable = true, clock_group = "SPI" },
    { name = "SYSCON" },
    { name = "SYSTEM" },
    { name = "SYSTIMER" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "TIMG1", clock_group = "TIMG" },
    { name = "TWAI0" },
    { name = "UART0", interrupts = { peri = "UART0" }, stable = true, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, stable = true, clock_group = "UART" },
    { name = "UHCI0" },
    { name = "USB_FS", interrupts = { peri = "USB" } },
    { name = "USB_WRAP", hidden = true },
    { name = "XTS_AES" },
    { name = "WIFI", interrupts = { mac = "WIFI_MAC", pwr = "WIFI_PWR" }, stable = true },

    { name = "ADC1", virtual = true },
    { name = "ADC2", virtual = true },
    { name = "DAC1", virtual = true },
    { name = "DAC2", virtual = true },
    { name = "FLASH", virtual = true },
    { name = "GPIO_DEDICATED", virtual = true },
    { name = "PSRAM", virtual = true },
    { name = "SW_INTERRUPT", virtual = true },
    { name = "ULP_RISCV_CORE", virtual = true },
]

[device.soc.clocks]
# {include clocks.toml}

[device.adc]
support_status = "partial"
instances = [
    { name = "adc1" },
    { name = "adc2" },
]

[device.aes]
support_status = "partial"
has_split_text_registers = true
endianness_configurable = true
dma_mode = ["ECB", "CBC", "OFB", "CTR", "CFB8", "CFB128", "GCM"]
key_length = { options = [
    { bits = 128, encrypt_mode = 0, decrypt_mode = 4 },
    { bits = 192, encrypt_mode = 1, decrypt_mode = 5 },
    { bits = 256, encrypt_mode = 2, decrypt_mode = 6 }
] }

[device.dac]
support_status = "partial"
instances = [
    { name = "dac1" },
    { name = "dac2" },
]

[device.dma]
support_status = "partial"
ext_mem_configurable_block_size = true
engines = [
    {
        name = "SPI_DMA",
        internal_ram_burst_sizes = [0, 4],
        burst_sizes = [16, 32, 64],
        drivers = ["spi_master", "spi_slave"],
        peripheral_instances = [
            { name = "SPI2", dma_id = 0 },
            { name = "SPI3", dma_id = 1 },
        ],
        channels = [
            { name = "DMA_SPI2", pac = "SPI2", interrupt = "SPI2_DMA", compatible_with = ["SPI2"] },
            { name = "DMA_SPI3", pac = "SPI3", interrupt = "SPI3_DMA", compatible_with = ["SPI3"] },
        ]
    },
    {
        name = "I2S_DMA",
        internal_ram_burst_sizes = [0, 4],
        burst_sizes = [16, 32, 64],
        drivers = ["i2s"],
        peripheral_instances = [
            { name = "I2S0", dma_id = 0 },
        ],
        channels = [
            { name = "DMA_I2S0", pac = "I2S0", interrupt = "I2S0", compatible_with = ["I2S0"] },
        ]
    },
    {
        name = "CRYPTO_DMA",
        internal_ram_burst_sizes = [0, 4],
        burst_sizes = [16, 32, 64],
        drivers = ["aes", "sha"],
        peripheral_instances = [
            { name = "AES", dma_id = 0 },
            { name = "SHA", dma_id = 1 },
        ],
        channels = [
            { name = "DMA_CRYPTO", pac = "CRYPTO_DMA", interrupt = "CRYPTO_DMA", compatible_with = ["AES", "SHA"], mem2mem = true, mem2mem_id = 0 }
        ]
    },
    {
        name = "COPY_DMA",
        channels = [
            { name = "DMA_COPY", pac = "COPY_DMA", interrupt = "DMA_COPY", mem2mem = true, mem2mem_id = 0 },
        ]
    },
]

[device.lp_io]
support_status = "partial"
version = "v2"

[device.gpio]
support_status = "supported"
# {include gpio.toml}

[device.dedicated_gpio]
version = "esp32s2"
support_status = "partial"
channels = [["PRO_ALONEGPIO0", "PRO_ALONEGPIO1", "PRO_ALONEGPIO2", "PRO_ALONEGPIO3", "PRO_ALONEGPIO4", "PRO_ALONEGPIO5", "PRO_ALONEGPIO6", "PRO_ALONEGPIO7"]]
needs_initialization = true

[device.i2c_master]
support_status = "supported"
version = 2
instances = [
    { name = "i2c0", sys_instance = "I2cExt0", scl = "I2CEXT0_SCL", sda = "I2CEXT0_SDA" },
    { name = "i2c1", sys_instance = "I2cExt1", scl = "I2CEXT1_SCL", sda = "I2CEXT1_SDA" },
]
ll_intr_mask = 0x1ffff
has_hw_bus_clear = false
fifo_size = 32
has_bus_timeout_enable = true
max_bus_timeout = 0xFFFFFF
separate_filter_config_registers = true
has_arbitration_en = true
has_pd_en = true
i2c0_data_register_ahb_address = 0x6001301c

[device.i2c_slave]
support_status = { status = "not_supported", issue = 1909 }

[device.interrupts]
support_status = "partial"
status_registers = 3
software_interrupt_count = 4
controller = "Xtensa"

[device.rmt]
support_status = "partial"
ram_start = 0x3f416400
channel_ram_size = 64
channels = ["RxTx", "RxTx", "RxTx", "RxTx"]
has_tx_immediate_stop = true
has_tx_loop_count = true
has_tx_carrier_data_only = true
has_tx_sync = true
has_rx_demodulation = true
has_per_channel_clock = true

[device.rsa]
version = 2
support_status = "partial"
size_increment = 32
memory_size_bytes = 512

[device.sha]
support_status = "partial"
algo = { sha1 = 0, sha224 = 1, sha256 = 2, sha384 = 3, sha512 = 4, sha512_224 = 5, sha512_256 = 6, sha512_t = 7 }

[device.sdm]
support_status = "partial"
channel_count = 8
clock_sources = ["apb"]
default_clock_source = "apb"

[device.spi_master]
version = 2
fifo_size = 72
bit_order_is_bool = true
support_status = "supported"
has_octal = true
has_dma_segmented_transfer = true
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        sio = ["FSPID", "FSPIQ", "FSPIWP", "FSPIHD", "FSPIIO4", "FSPIIO5", "FSPIIO6", "FSPIIO7"],
        cs = ["FSPICS0", "FSPICS1", "FSPICS2", "FSPICS3", "FSPICS4", "FSPICS5"]
    },
    {
        name = "spi3",
        sys_instance = "Spi3",
        sclk = "SPI3_CLK",
        sio = ["SPI3_D", "SPI3_Q"],
        cs = ["SPI3_CS0", "SPI3_CS1", "SPI3_CS2"]
    },
]

[device.spi_slave]
support_status = "partial"
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        mosi = "FSPID",
        miso = "FSPIQ",
        cs = "FSPICS0"
    },
    {
        name = "spi3",
        sys_instance = "Spi3",
        sclk = "SPI3_CLK",
        mosi = "SPI3_D",
        miso = "SPI3_Q",
        cs = "SPI3_CS0"
    },
]

[device.timergroup]
support_status = "partial"
timg_has_timer1 = true
timg_has_divcnt_rst = false
instances = [{ name = "timg0" }, { name = "timg1" }]

[device.uart]
support_status = "supported"
instances = [
    { name = "uart0", sys_instance = "Uart0", tx = "U0TXD", rx = "U0RXD", cts = "U0CTS", rts = "U0RTS" },
    { name = "uart1", sys_instance = "Uart1", tx = "U1TXD", rx = "U1RXD", cts = "U1CTS", rts = "U1RTS" },
]
ram_size = 128
version = 1

[device.uhci]
support_status = "not_supported"

[device.rgb_display] # via SPI and I2S
support_status = "not_supported"

[device.camera] # via I2S
support_status = "not_supported"

[device.touch]
support_status = { status = "not_supported", issue = 1905 }

[device.ds]
support_status = { status = "not_supported", issue = 884 }

[device.rng]
support_status = "partial"
trng_supported = true
apb_cycle_wait_num = 16 # TODO

[device.sleep]
support_status = "partial"
light_sleep = true
deep_sleep = true
wakeup_sources = {
    Ext0 = 0,
    Ext1 = 1,
    Gpio = 2,
    Timer = 3,
    Wifi = 5,
    Uart0 = 6,
    Uart1 = 7,
    Touch = 8,
    #UlpFsm = 9,
    UlpRiscv = 11,
    UlpRiscvTrap = 13,
    Usb = 15,
}

# Other drivers which are partially supported but have no other configuration:

## Crypto
[device.hmac]

## Interfaces
[device.i2s]
version = 1
default_clock_source = 2
mclk_divider_bit_width = 6
max_ws_width = 128
instances = [
    {
        name = "i2s0",
        sys_instance = "I2s0",
        mclk = "CLK_I2S",
        bclk = "I2S0O_BCK",
        ws = "I2S0O_WS",
        bclk_rx = "I2S0I_BCK",
        ws_rx = "I2S0I_WS",
        dout = ["I2S0O_DATA_OUT23"],
        din = ["I2S0I_DATA_IN15"],
    },
]

[device.ledc]
version = 2
channel_count = 8
[device.pcnt]
[device.twai]
[device.usb_otg]
fifo_depth_words = 256

## Miscellaneous
[device.io_mux]
[device.psram]
extmem_origin = 0x3f500000
# octal_spi = true

[device.systimer]
[device.temp_sensor]
[device.ulp_fsm]
support_status = "not_supported"
[device.ulp_riscv]
[device.lp_timer]

## Radio
[device.wifi]
mac_version = 1
csi_supported = true

[device.phy]
