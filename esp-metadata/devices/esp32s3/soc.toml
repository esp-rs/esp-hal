    {
        name = "i2s1",
        sys_instance = "I2s1",
        mclk = "I2S1_MCLK",
        bclk = "I2S1O_BCK",
        ws = "I2S1O_WS",
        bclk_rx = "I2S1I_BCK",
        ws_rx = "I2S1I_WS",
        dout = ["I2S1O_SD"],
        din = ["I2S1I_SD"],
