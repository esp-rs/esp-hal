# ESP32-P4 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32p4"
arch   = "riscv"
target = "riscv32imafc-unknown-none-elf"
cores  = 2
trm   = "https://www.espressif.com/sites/default/files/documentation/esp32-p4_technical_reference_manual_en.pdf"

symbols = [
    "very_large_intr_status",
    "spi_octal",
]

[device.interrupts]
support_status = "partial"
# ESP32-P4 uses CLIC with 48 interrupt lines (TRM v0.5, Ch 14)
# "very_large_intr_status" uses 3 status registers (same as C5/C61)
status_registers = 3
software_interrupt_count = 4
software_interrupt_delay = 24
controller = { Riscv = { flavour = "clic", interrupts = 48, priority_levels = 8 } }

[device.soc]
cpu_has_csr_pc = true
# ESP32-P4 v3.x: 20 MHz RC_FAST default (TRM v0.5, Ch 12)
rc_fast_clk_default = 20_000_000

# Clock tree for ESP32-P4X (eco5 / chip revision v3.x)
# 3 PLLs: CPLL (CPU, 360/400MHz), SPLL (480MHz, peripherals), MPLL (400MHz, PSRAM/media)
# Ref: esp-idf clk_tree_defs.h, clk_tree_ll.h, TRM v0.5 Ch 12
clocks = { system_clocks = { clock_tree = [
    # High-speed clock sources
    { name = "XTAL_CLK",    type = "source",  output = "40_000_000", always_on = true },
    { name = "CPLL_CLK",    type = "derived", from = "XTAL_CLK", output = "400_000_000" }, # eco5 default 400MHz
    { name = "SPLL_CLK",    type = "derived", from = "XTAL_CLK", output = "480_000_000" }, # System PLL
    { name = "MPLL_CLK",    type = "derived", from = "XTAL_CLK", output = "400_000_000" }, # Media PLL
    { name = "RC_FAST_CLK", type = "source",                     output = "20_000_000" },

    # Low-speed clocks
    { name = "XTAL32K_CLK",  type = "source", output = "32768"   },
    { name = "OSC_SLOW_CLK", type = "source", output = "32768"   },
    { name = "RC_SLOW_CLK",  type = "source", output = "136_000" },
    { name = "RC32K_CLK",    type = "source", output = "32768"   },

    # SPLL divider taps (from 480 MHz SPLL)
    { name = "PLL_F20M",  type = "generic", output = "SPLL_CLK / 24" },
    { name = "PLL_F80M",  type = "generic", output = "SPLL_CLK / 6"  },
    { name = "PLL_F120M", type = "generic", output = "SPLL_CLK / 4"  },
    { name = "PLL_F160M", type = "generic", output = "SPLL_CLK / 3"  },
    { name = "PLL_F240M", type = "generic", output = "SPLL_CLK / 2"  },

    # MPLL divider taps (from 400 MHz MPLL)
    { name = "PLL_F25M",  type = "generic", output = "MPLL_CLK / 16" },
    { name = "PLL_F50M",  type = "generic", output = "MPLL_CLK / 8"  },

    # XTAL half
    { name = "XTAL_D2_CLK", type = "generic", output = "XTAL_CLK / 2" },

    # CPU root clock (LP_AON_CLKRST.hp_clk_ctrl.hp_root_clk_src_sel)
    { name = "CPU_ROOT_CLK", type = "mux", variants = [
        { name = "XTAL",    outputs = "XTAL_CLK" },
        { name = "CPLL",    outputs = "CPLL_CLK" },
        { name = "RC_FAST", outputs = "RC_FAST_CLK" },
    ] },

    # CPU_CLK divider (HP_SYS_CLKRST.root_clk_ctrl0.cpu_clk_div_num)
    { name = "CPU_CLK", type = "generic", params = { divisor = "0..256" }, output = "CPU_ROOT_CLK / (divisor + 1)" },
    # APB_CLK divider
    { name = "APB_CLK", type = "generic", params = { divisor = "0..256" }, output = "CPU_CLK / (divisor + 1)" },

    # LP clocks
    { name = "LP_FAST_CLK", type = "mux", variants = [
        { name = "RC_FAST", outputs = "RC_FAST_CLK" },
        { name = "XTAL_D2", outputs = "XTAL_D2_CLK" },
    ] },
    { name = "LP_SLOW_CLK", type = "mux", variants = [
        { name = "RC_SLOW",  outputs = "RC_SLOW_CLK" },
        { name = "XTAL32K",  outputs = "XTAL32K_CLK" },
        { name = "RC32K",    outputs = "RC32K_CLK" },
        { name = "OSC_SLOW", outputs = "OSC_SLOW_CLK" },
    ] },
], template_groups = [
    { group = "UART", clocks = [
        { name = "FUNCTION_CLOCK", type = "generic", output = "sclk / (div_num + 1)", params = { sclk = [
            { name = "XTAL",     outputs = "XTAL_CLK", default = true },
            { name = "PLL_F80M", outputs = "PLL_F80M" },
            { name = "RC_FAST",  outputs = "RC_FAST_CLK" },
        ], div_num = "0 .. 0x100" } },
        { name = "BAUD_RATE_GENERATOR", type = "generic", output = "(FUNCTION_CLOCK * 16) / (integral * 16 + fractional)", params = { fractional = "0..16", integral = "0..0x1000" } },
    ] },
    { group = "TIMG", clocks = [
        { name = "FUNCTION_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK", default = true },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
            { name = "PLL_F80M",    outputs = "PLL_F80M" },
        ] },
        { name = "WDT_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK", default = true },
            { name = "PLL_F80M",    outputs = "PLL_F80M" },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
        ] },
    ] },
] } }

# HP L2MEM: 0x4FF0_0000 - 0x4FFC_0000 (768 KB)
# ROM bootloader reserves 0x4FF0_0000 - 0x4FF4_0000 (256 KB)
# dram: usable application RAM (after ROM reserved region)
# dram2_uninit: ROM reserved area, reclaimable after 2nd-stage bootloader
# Ref: esp-idf soc.h -- SOC_DIRAM_ROM_RESERVE_HIGH = 0x4FF40000
memory_map = { ranges = [
    { name = "dram", start = 0x4FF4_0000, end = 0x4FFC_0000 },
    { name = "dram2_uninit", start = 0x4FF0_0000, end = 0x4FF4_0000 },
] }

peripherals = [
    # Minimal set for esp-hal compilation
    { name = "EFUSE", hidden = true },
    { name = "GPIO" },
    { name = "HP_SYS" },
    { name = "HP_SYS_CLKRST" },
    { name = "INTERRUPT_CORE0" },
    { name = "INTERRUPT_CORE1" },
    # CLIC is the per-core interrupt controller (TRM Ch 14), used by user code
    # to enable/disable/prioritize interrupts.
    { name = "CLIC" },
    { name = "IO_MUX" },
    { name = "LP_AON", pac = "LP_SYS" },
    { name = "LP_AON_CLKRST" },
    { name = "LP_SYS" },
    { name = "LP_WDT" },
    { name = "LPWR", pac = "LP_SYS" },
    { name = "PMU" },
    { name = "SYSTIMER" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "TIMG1", clock_group = "TIMG" },
    { name = "UART0", interrupts = { peri = "UART0" }, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, clock_group = "UART" },
    { name = "UART2", interrupts = { peri = "UART2" }, clock_group = "UART" },
    { name = "UART3", interrupts = { peri = "UART3" }, clock_group = "UART" },
    { name = "UART4", interrupts = { peri = "UART4" }, clock_group = "UART" },
    # Phase 2 peripherals
    { name = "SPI2", interrupts = { peri = "SPI2" }, dma_peripheral = 1 },
    # SPI3: same RegisterBlock layout as SPI2 but different PAC type.
    # Map to SPI2 RegisterBlock for esp-hal driver compatibility.
    { name = "SPI3", pac = "SPI2", interrupts = { peri = "SPI3" }, dma_peripheral = 2 },
    { name = "I2C0", interrupts = { peri = "I2C0" } },
    { name = "I2C1", interrupts = { peri = "I2C1" } },
    { name = "TWAI0", interrupts = { peri = "TWAI0" } },
    { name = "TWAI1", interrupts = { peri = "TWAI1" } },
    { name = "TWAI2", interrupts = { peri = "TWAI2" } },
    { name = "PSRAM", virtual = true },
    # DMA: PAC "DMA" is DW_GDMA (DesignWare), "AHB_DMA" is GDMA v2 compatible
    # Using pac="AHB_DMA" maps DMA singleton to AHB_DMA RegisterBlock
    { name = "DMA", pac = "AHB_DMA" },
    { name = "DMA_CH0", virtual = true },
    { name = "DMA_CH1", virtual = true },
    { name = "DMA_CH2", virtual = true },
    # Phase 3 peripherals
    { name = "USB_DEVICE", interrupts = { peri = "USB_DEVICE" } },
    { name = "SDHOST" },
    # EMAC: PAC에 없음. MMIO 0x5009_8000. esp-hal에도 EMAC driver 없음 (ESP32만).
    # 새 driver 필요: components/esp_hal_emac/esp32p4/include/hal/emac_ll.h 참고
    # { name = "EMAC" },
    # Phase 4 peripherals
    { name = "LEDC", interrupts = { peri = "LEDC" } },
    { name = "MCPWM0", interrupts = { peri = "PWM0" } },
    { name = "MCPWM1", interrupts = { peri = "PWM1" } },
    { name = "PCNT", interrupts = { peri = "PCNT" } },
    { name = "RMT", interrupts = { peri = "RMT" } },
    { name = "ADC" },
    { name = "AES", interrupts = { peri = "AES" }, dma_peripheral = 4 },
    { name = "SHA", interrupts = { peri = "SHA" }, dma_peripheral = 5 },
    { name = "RSA", interrupts = { peri = "RSA" } },
    { name = "ECC", interrupts = { peri = "ECC" } },
]

# UART: 5 instances (UART0-4), 128-byte FIFO
# Ref: esp-idf uart_ll.h, TRM v0.5 Ch 46
[device.uart]
support_status = "partial"
instances = [
    { name = "uart0", sys_instance = "Uart0", tx = "UART0_TXD", rx = "UART0_RXD", cts = "UART0_CTS", rts = "UART0_RTS" },
    { name = "uart1", sys_instance = "Uart1", tx = "UART1_TXD", rx = "UART1_RXD", cts = "UART1_CTS", rts = "UART1_RTS" },
    { name = "uart2", sys_instance = "Uart2", tx = "UART2_TXD", rx = "UART2_RXD", cts = "UART2_CTS", rts = "UART2_RTS" },
    { name = "uart3", sys_instance = "Uart3", tx = "UART3_TXD", rx = "UART3_RXD", cts = "UART3_CTS", rts = "UART3_RTS" },
    { name = "uart4", sys_instance = "Uart4", tx = "UART4_TXD", rx = "UART4_RXD", cts = "UART4_CTS", rts = "UART4_RTS" },
]
ram_size = 128

# SYSTIMER: 2 counter units, 3 alarm comparators, 16 MHz (XTAL/2.5)
# Ref: esp-idf systimer_ll.h, TRM v0.5 Ch 17
# PAC register names verified: unit_op(n), unit_value(n), target_conf(n),
# trgt(n), comp_load(n) all match esp-hal systimer module expectations.
[device.systimer]

# GP Timer (TIMG): 2 groups, each with 2 timers + WDT
# Ref: esp-idf timer_ll.h, TRM v0.5 Ch 18
[device.gp_timer]
support_status = "partial"
instances = [
    { name = "timg0", sys_instance = "Timg0", interrupt = "TG0_T0_LEVEL" },
    { name = "timg1", sys_instance = "Timg1", interrupt = "TG1_T0_LEVEL" },
]

# SPI Master: 2 instances (GPSPI2, GPSPI3)
# Ref: esp-idf spi_ll.h, TRM v0.5 Ch 47
# SPI Master: SPI2 only (SPI2 and SPI3 have different PAC RegisterBlock types)
# Ref: esp-idf spi_ll.h, TRM v0.5 Ch 47
[device.spi_master]
support_status = "partial"
supports_dma = true
instances = [
    { name = "spi2", sys_instance = "Spi2", sclk = "SPI2_CK", sio = ["SPI2_D", "SPI2_Q", "SPI2_WP", "SPI2_HOLD"], cs = ["SPI2_CS"] },
    { name = "spi3", sys_instance = "Spi3", sclk = "SPI3_CK", sio = ["SPI3_D", "SPI3_Q", "SPI3_WP", "SPI3_HOLD"], cs = ["SPI3_CS", "SPI3_CS1", "SPI3_CS2"] },
]

# I2C Master: 2 instances
# P4 PAC: data register is read-only, TX uses txfifo_start_addr (fixed in i2c/master/mod.rs)
# Ref: esp-idf i2c_ll.h, TRM v0.5 Ch 48
[device.i2c_master]
support_status = "partial"
instances = [
    { name = "i2c0", sys_instance = "I2c0", scl = "I2C0_SCL", sda = "I2C0_SDA" },
    { name = "i2c1", sys_instance = "I2c1", scl = "I2C1_SCL", sda = "I2C1_SDA" },
]
has_fsm_timeouts = true
has_hw_bus_clear = true
ll_intr_mask = 0x3ffff
fifo_size = 32
has_bus_timeout_enable = true
max_bus_timeout = 0x1F

# DMA: deferred -- P4 PAC "DMA" is DW_GDMA (DesignWare), not AHB_DMA
# P4 has: AHB_DMA (GDMA v2 at 0x50085000) + AXI_DMA (0x5008A000) + DW_GDMA (0x50086000)
# esp-hal expects DMA singleton to be GDMA v2 compatible (in_conf0/out_conf0/in_link/out_link)
# But P4 PAC's "DMA" type is DW_GDMA (sar0/dar0/ctl0 pattern), NOT compatible
# Need: either PAC fix (rename AHB_DMA -> DMA) or esp-hal adapter layer
# Ref: esp-idf ahb_dma_ll.h for AHB_DMA register layout
# Ref: esp-idf dw_gdma_ll.h for DW_GDMA (different, DesignWare IP)
[device.dma]
support_status = "partial"
kind = "gdma"
gdma_version = 2
separate_in_out_interrupts = true
max_priority = 5

# TWAI (CAN): 3 instances
# Ref: esp-idf twai_ll.h, TRM v0.5 Ch 58
[device.twai]
support_status = "partial"

# ADC: HP ADC + LP ADC
# Ref: TRM v0.5 Ch 38 (ADC), Ch 41 (LP ADC)
# Note: P4 ADC calibration needs special value (4 not 1) -- not yet implemented
[device.adc]
support_status = "partial"

# Temperature sensor (LP_TSENS)
# Ref: TRM v0.5 Ch 43 (Temperature Sensor)
# [device.temperature_sensor]
# support_status = "partial"

# Touch sensor (LP_TOUCH, 14 channels)
# Ref: TRM v0.5 Ch 42 (Touch Sensor)
# [device.touch]
# support_status = "partial"

# AES: hardware accelerator
# Ref: esp-idf aes_ll.h, TRM v0.5 Ch 28
[device.aes]
support_status = "partial"
has_split_text_registers = true
endianness_configurable = false
dma = true
key_length = { options = [
    { bits = 128, encrypt_mode = 0, decrypt_mode = 4 },
    { bits = 256, encrypt_mode = 2, decrypt_mode = 6 },
] }

# SHA: hardware accelerator
# Ref: esp-idf sha_ll.h, TRM v0.5 Ch 34
[device.sha]
support_status = "partial"
dma = true
algo = { sha1 = 0, sha224 = 1, sha256 = 2 }

# RSA: hardware accelerator
# Ref: esp-idf mpi_ll.h, TRM v0.5 Ch 33
[device.rsa]
support_status = "partial"
size_increment = 32
memory_size_bytes = 384

# ECC: hardware accelerator (eco5+ supported)
# Ref: esp-idf ecc_ll.h, TRM v0.5 Ch 30
# USB Serial/JTAG controller
[device.usb_serial_jtag]

[device.ecc]
support_status = "partial"
working_modes = [
    { id = 0, mode = "affine_point_multiplication" },
    { id = 2, mode = "affine_point_verification" },
    { id = 3, mode = "affine_point_verification_and_multiplication" },
    { id = 4, mode = "jacobian_point_multiplication" },
    { id = 5, mode = "affine_point_addition" },
    { id = 6, mode = "jacobian_point_verification" },
    { id = 7, mode = "affine_point_verification_and_jacobian_point_multiplication" },
    { id = 8, mode = "modular_addition" },
]
curves = [
    { id = 0, curve = 192 },
    { id = 1, curve = 256 },
    { id = 2, curve = 384 },
]
separate_jacobian_point_memory = true

[device.gpio]
