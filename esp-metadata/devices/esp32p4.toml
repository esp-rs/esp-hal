# DMA: P4 exposes three DMA controllers. IDF public docs
# (https://docs.espressif.com/projects/esp-idf/en/stable/esp32p4/api-reference/system/async_memcpy.html)
# refer to them as GDMA-AHB and GDMA-AXI:
#   AHB_DMA / GDMA-AHB (0x50085000): GDMA v2 layout -- used by esp-hal as `Dma`
#   AXI_DMA / GDMA-AXI (0x5008A000): AXI-bus DMA, different layout
#   DMA (separate block at 0x50081000, SOC_DW_GDMA_SUPPORTED):
#     another register layout, not used by esp-hal
# esp-hal's `Dma` singleton must be GDMA v2 compatible, hence PAC alias AHB_DMA above.
# Ref: IDF linker esp32p4.peripherals.ld (AHB_DMA, AXI_DMA, DW_GDMA symbols).
[device.dma]
support_status = "not_supported" # PAC needs more work
kind = "gdma"
gdma_version = 2
separate_in_out_interrupts = true
max_priority = 5

