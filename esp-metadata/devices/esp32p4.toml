# ESP32-P4 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32p4"
arch   = "riscv"
target = "riscv32imafc-unknown-none-elf"
cores  = 1 # FIXME: Temporarily set to 1, too many things want CPU_CTRL to be implemented
trm   = "https://www.espressif.com/sites/default/files/documentation/esp32-p4_technical_reference_manual_en.pdf"

symbols = [
    # Additional peripherals defined by us (the developers):
    "very_large_intr_status",
    "spi_octal",

    # ROM capabilities
    "rom_crc_le",
    "rom_crc_be",
    "rom_md5_bsd",

    # Wakeup SOC based on ESP-IDF:
    "pm_support_ext1_wakeup",
    "pm_support_touch_sensor_wakeup",

    # TODO: add the following symbols when investigation and getting ready
    #   - "lp_core"
    #   - "swd"
    #   - "gpio_support_deepsleep_wakeup"
    #   - "uart_support_wakeup_int"
]

[device.interrupts]
support_status = "partial"
# ESP32-P4 uses CLIC with 48 interrupt lines (TRM v0.5, Ch 14)
# "very_large_intr_status" uses 3 status registers (same as C5/C61)
status_registers = 3
software_interrupt_count = 4
software_interrupt_delay = 24
controller = { Riscv = { flavour = "clic", interrupts = 48, priority_levels = 8 } }

# TODO: align with newer TRM revisions after v0.5. The v0.5 TRM still has
# the following sections incomplete:
# - Bus Architecture
# - Processor Instruction Extensions
# - AXI Performance Monitor
# - MIPI DSI (CAM)
# - I3C

[device.soc]
cpu_has_csr_pc = false
# ESP32-P4 v3.x: 20 MHz RC_FAST default (TRM v0.5, Ch 12)
rc_fast_clk_default = 20_000_000

# Clock tree for ESP32-P4X (eco5 / chip revision v3.x)
# 3 PLLs: CPLL (CPU, 360/400MHz), SPLL (480MHz, peripherals), MPLL (400MHz, PSRAM/media)
clocks = { system_clocks = { clock_tree = [
    # High-speed clock sources
    { name = "XTAL_CLK",    type = "source",  output = "40_000_000", always_on = true },
    { name = "CPLL_CLK",    type = "derived", from = "XTAL_CLK", output = "400_000_000" }, # eco5 default 400MHz
    { name = "SPLL_CLK",    type = "derived", from = "XTAL_CLK", output = "480_000_000" }, # System PLL
    { name = "MPLL_CLK",    type = "derived", from = "XTAL_CLK", output = "400_000_000" }, # Media PLL
    { name = "RC_FAST_CLK", type = "source",                     output = "20_000_000" },

    # Low-speed clocks
    { name = "XTAL32K_CLK",  type = "source", output = "32768"   },
    { name = "OSC_SLOW_CLK", type = "source", output = "32768"   },
    { name = "RC_SLOW_CLK",  type = "source", output = "136_000" },
    { name = "RC32K_CLK",    type = "source", output = "32768"   },

    # SPLL divider taps (from 480 MHz SPLL)
    { name = "PLL_F20M",  type = "generic", output = "SPLL_CLK / 24" },
    { name = "PLL_F80M",  type = "generic", output = "SPLL_CLK / 6"  },
    { name = "PLL_F120M", type = "generic", output = "SPLL_CLK / 4"  },
    { name = "PLL_F160M", type = "generic", output = "SPLL_CLK / 3"  },
    { name = "PLL_F240M", type = "generic", output = "SPLL_CLK / 2"  },

    # MPLL divider taps (from 400 MHz MPLL)
    { name = "PLL_F25M",  type = "generic", output = "MPLL_CLK / 16" },
    { name = "PLL_F50M",  type = "generic", output = "MPLL_CLK / 8"  },

    # XTAL half
    { name = "XTAL_D2_CLK", type = "generic", output = "XTAL_CLK / 2" },

    # CPU root clock (LP_AON_CLKRST.hp_clk_ctrl.hp_root_clk_src_sel)
    { name = "CPU_ROOT_CLK", type = "mux", variants = [
        { name = "XTAL",    outputs = "XTAL_CLK" },
        { name = "CPLL",    outputs = "CPLL_CLK" },
        { name = "RC_FAST", outputs = "RC_FAST_CLK" },
    ] },

    # CPU_CLK divider (HP_SYS_CLKRST.root_clk_ctrl0.cpu_clk_div_num)
    { name = "CPU_CLK", type = "generic", params = { divisor = "0..256" }, output = "CPU_ROOT_CLK / (divisor + 1)" },
    # APB_CLK divider
    { name = "APB_CLK", type = "generic", params = { divisor = "0..256" }, output = "CPU_CLK / (divisor + 1)" },

    # LP clocks
    { name = "LP_FAST_CLK", type = "mux", variants = [
        { name = "RC_FAST", outputs = "RC_FAST_CLK" },
        { name = "XTAL_D2", outputs = "XTAL_D2_CLK" },
    ] },
    { name = "LP_SLOW_CLK", type = "mux", variants = [
        { name = "RC_SLOW",  outputs = "RC_SLOW_CLK" },
        { name = "XTAL32K",  outputs = "XTAL32K_CLK" },
        #{ name = "RC32K",    outputs = "RC32K_CLK" },
        { name = "OSC_SLOW", outputs = "OSC_SLOW_CLK" },
    ] },

    # TIMG0-only?
    { name = "TIMG_CALIBRATION_CLOCK", type = "mux", variants = [
        { name = "MPLL_CLK",        outputs = "MPLL_CLK" },
        { name = "SPLL_CLK",        outputs = "SPLL_CLK" },
        { name = "CPLL_CLK",        outputs = "CPLL_CLK" },
        #{ name = "APLL_CLK",        outputs = "APLL_CLK" },
        #{ name = "SDIO_PLL0_CLK",   outputs = "SDIO_PLL0_CLK" },
        #{ name = "SDIO_PLL1_CLK",   outputs = "SDIO_PLL1_CLK" },
        #{ name = "SDIO_PLL2_CLK",   outputs = "SDIO_PLL2_CLK" },
        { name = "RC_FAST_CLK",     outputs = "RC_FAST_CLK" },
        { name = "RC_SLOW_CLK",     outputs = "LP_SLOW_CLK" },
        { name = "XTAL32K_CLK",     outputs = "XTAL32K_CLK" },
        #{ name = "PLL_LP_CLK",      outputs = "PLL_LP_CLK" },
    ] },
], template_groups = [
    { group = "UART", clocks = [
        { name = "FUNCTION_CLOCK", type = "generic", output = "sclk / (div_num + 1)", params = { sclk = [
            { name = "XTAL",     outputs = "XTAL_CLK", default = true },
            { name = "PLL_F80M", outputs = "PLL_F80M" },
            { name = "RC_FAST",  outputs = "RC_FAST_CLK" },
        ], div_num = "0 .. 0x100" } },
        { name = "BAUD_RATE_GENERATOR", type = "generic", output = "(FUNCTION_CLOCK * 16) / (integral * 16 + fractional)", params = { fractional = "0..16", integral = "0..0x1000" } },
    ] },
    { group = "TIMG", clocks = [
        { name = "FUNCTION_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK", default = true },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
            { name = "PLL_F80M",    outputs = "PLL_F80M" },
        ] },
        { name = "WDT_CLOCK", type = "mux", variants = [
            { name = "XTAL_CLK",    outputs = "XTAL_CLK", default = true },
            { name = "PLL_F80M",    outputs = "PLL_F80M" },
            { name = "RC_FAST_CLK", outputs = "RC_FAST_CLK" },
        ] },
    ] },
] }, peripheral_clocks = { templates = [
    # ESP32-P4 peripheral clock and reset gates -- all live in HP_SYS_CLKRST.
    # Clock enables: SOC_CLK_CTRL0/1/2 + PERI_CLK_CTRL{21,26}.
    # Resets:        HP_RST_EN0/1/2.
    # Each peripheral overrides {{default_clk_en_template}} / {{default_rst_template}}
    # to select the right shared register + bit field.
    { name = "clk_en_template",         value = "{{default_clk_en_template}}" },
    { name = "rst_template",            value = "{{default_rst_template}}" },
    { name = "default_clk_en_template", value = "let _ = enable;" },
    { name = "default_rst_template",    value = "let _ = reset;" },
    # Reusable clock-enable building blocks (composed via {{default_clk_en_template}} = "{{X}}").
    { name = "sys_clk_template",        value = "{{control}}::regs().soc_clk_ctrl1().modify(|_, w| w.{{sys_field}}().bit(enable));" },
    { name = "apb_clk_template",        value = "{{control}}::regs().soc_clk_ctrl2().modify(|_, w| w.{{apb_field}}().bit(enable));" },
    { name = "sys_apb_clk_template",    value = "{{sys_clk_template}} {{apb_clk_template}}" },
    { name = "crypto_clk_template",     value = "{{control}}::regs().soc_clk_ctrl1().modify(|_, w| w.crypto_sys_clk_en().bit(enable));" },
    # Reusable reset building blocks. Reset bit name is supplied via {{rst_field}}.
    { name = "rst_en0_template",        value = "{{control}}::regs().hp_rst_en0().modify(|_, w| w.{{rst_field}}().bit(reset));" },
    { name = "rst_en1_template",        value = "{{control}}::regs().hp_rst_en1().modify(|_, w| w.{{rst_field}}().bit(reset));" },
    { name = "rst_en2_template",        value = "{{control}}::regs().hp_rst_en2().modify(|_, w| w.{{rst_field}}().bit(reset));" },
    { name = "control",                 value = "crate::peripherals::HP_SYS_CLKRST" },
], peripheral_clocks = [
    # Ref: TRM v0.5 Ch 12 (Reset and Clock), Ch 22 (System Registers).
    # UARTs -- sys_clk + apb_clk; reset asserts both core+apb together.
    { name = "Uart0", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "uart0_sys_clk_en", apb_field = "uart0_apb_clk_en", default_rst_template = "{{control}}::regs().hp_rst_en1().modify(|_, w| w.rst_en_uart0_core().bit(reset).rst_en_uart0_apb().bit(reset));" }, keep_enabled = true },
    { name = "Uart1", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "uart1_sys_clk_en", apb_field = "uart1_apb_clk_en", default_rst_template = "{{control}}::regs().hp_rst_en1().modify(|_, w| w.rst_en_uart1_core().bit(reset).rst_en_uart1_apb().bit(reset));" } },
    { name = "Uart2", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "uart2_sys_clk_en", apb_field = "uart2_apb_clk_en", default_rst_template = "{{control}}::regs().hp_rst_en1().modify(|_, w| w.rst_en_uart2_core().bit(reset).rst_en_uart2_apb().bit(reset));" } },
    { name = "Uart3", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "uart3_sys_clk_en", apb_field = "uart3_apb_clk_en", default_rst_template = "{{control}}::regs().hp_rst_en1().modify(|_, w| w.rst_en_uart3_core().bit(reset).rst_en_uart3_apb().bit(reset));" } },
    { name = "Uart4", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "uart4_sys_clk_en", apb_field = "uart4_apb_clk_en", default_rst_template = "{{control}}::regs().hp_rst_en1().modify(|_, w| w.rst_en_uart4_core().bit(reset).rst_en_uart4_apb().bit(reset));" } },
    # SPI -- sys_clk + apb_clk; reset in HP_RST_EN2.
    { name = "Spi2", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "gpspi2_sys_clk_en", apb_field = "gpspi2_apb_clk_en", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_spi2" } },
    { name = "Spi3", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "gpspi3_sys_clk_en", apb_field = "gpspi3_apb_clk_en", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_spi3" } },
    # I2C master -- apb_clk only; reset in HP_RST_EN1.
    { name = "I2c0", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "i2c0_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_i2c0" } },
    { name = "I2c1", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "i2c1_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_i2c1" } },
    # I2S -- apb_clk; reset in HP_RST_EN2.
    { name = "I2s0", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "i2s0_apb_clk_en", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_i2s0_apb" } },
    { name = "I2s1", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "i2s1_apb_clk_en", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_i2s1_apb" } },
    { name = "I2s2", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "i2s2_apb_clk_en", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_i2s2_apb" } },
    # Timers -- Systimer also needs PERI_CLK_CTRL21.systimer_clk_en gate.
    { name = "Systimer", template_params = { default_clk_en_template = "{{control}}::regs().soc_clk_ctrl2().modify(|_, w| w.systimer_apb_clk_en().bit(enable)); {{control}}::regs().peri_clk_ctrl21().modify(|_, w| w.systimer_clk_en().bit(enable));", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_stimer" }, keep_enabled = true },
    { name = "Timg0", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "timergrp0_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_timergrp0" }, keep_enabled = true },
    { name = "Timg1", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "timergrp1_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_timergrp1" } },
    # IO MUX -- gated via PERI_CLK_CTRL26; KEEP_ENABLED because GPIO depends on it.
    { name = "Iomux", template_params = { default_clk_en_template = "{{control}}::regs().peri_clk_ctrl26().modify(|_, w| w.iomux_clk_en().bit(enable));", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_iomux" }, keep_enabled = true },
    # PWM/Counter/RMT -- LCD/CAM clock gate lives in SOC_CLK_CTRL3 (not modelled in current PAC), keep stub.
    { name = "Ledc",   template_params = { default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_ledc" } },
    { name = "Pcnt",   template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "pcnt_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_pcnt" } },
    { name = "Mcpwm0", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "mcpwm0_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_pwm0" } },
    { name = "Mcpwm1", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "mcpwm1_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_pwm1" } },
    # NOTE: `rmt_sys_clk_en` despite the name lives on SOC_CLK_CTRL2, not CTRL1.
    { name = "Rmt", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "rmt_sys_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_rmt" } },
    # TWAI (CAN) -- reset bits named can0/can1/can2 in PAC.
    { name = "Twai0", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "twai0_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_can0" } },
    { name = "Twai1", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "twai1_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_can1" } },
    { name = "Twai2", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "twai2_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_can2" } },
    # USB -- reset is via LP-domain registers, leave rst as no-op here.
    { name = "UsbOtg11",  template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "usb_otg11_sys_clk_en" } },
    { name = "UsbOtg20",  template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "usb_otg20_sys_clk_en" } },
    { name = "UsbDevice", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "usb_device_apb_clk_en" }, keep_enabled = true },
    # Connectivity -- EMAC and SDMMC reset live in dedicated registers, no HP_RST_EN gate.
    { name = "Emac",  template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "emac_sys_clk_en" } },
    { name = "Sdmmc", template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "sdmmc_sys_clk_en" } },
    { name = "Uhci",  template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "uhci_sys_clk_en", apb_field = "uhci_apb_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_uhci" } },
    # Crypto -- shared crypto_sys_clk_en bit; each peripheral has its own reset bit.
    { name = "Aes",   template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_aes" } },
    { name = "Sha",   template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_sha" } },
    { name = "Rsa",   template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_rsa" } },
    { name = "Ecc",   template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_ecc" } },
    { name = "Ecdsa", template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_ecdsa" } },
    { name = "Hmac",  template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_hmac" } },
    { name = "Ds",    template_params = { default_clk_en_template = "{{crypto_clk_template}}", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_ds" } },
    # DMA -- P4 has multiple controllers (AHB-PDMA / AXI-PDMA / GDMA-DW). `Dma` is the GDMA-AHB
    # variant esp-hal's DMA driver targets. `Gdma` covers the DW block at 0x5008_1000.
    { name = "Dma",     template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "ahb_pdma_sys_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_ahb_pdma" } },
    { name = "Gdma",    template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "gdma_sys_clk_en", default_rst_template = "{{rst_en0_template}}", rst_field = "rst_en_gdma" } },
    { name = "AhbPdma", template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "ahb_pdma_sys_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_ahb_pdma" } },
    { name = "AxiPdma", template_params = { default_clk_en_template = "{{sys_clk_template}}", sys_field = "axi_pdma_sys_clk_en", default_rst_template = "{{rst_en1_template}}", rst_field = "rst_en_axi_pdma" } },
    # ADC.
    { name = "Adc", template_params = { default_clk_en_template = "{{apb_clk_template}}", apb_field = "adc_apb_clk_en", default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_adc" } },
    # Parallel IO -- reset asserts the parlio block plus its rx/tx subreset bits in one write.
    { name = "ParlIo", template_params = { default_clk_en_template = "{{sys_apb_clk_template}}", sys_field = "parlio_sys_clk_en", apb_field = "parlio_apb_clk_en", default_rst_template = "{{control}}::regs().hp_rst_en2().modify(|_, w| w.rst_en_parlio().bit(reset).rst_en_parlio_rx().bit(reset).rst_en_parlio_tx().bit(reset));" } },
    # LCD/CAM -- clock gate lives in SOC_CLK_CTRL3 (not modelled), only reset is wired up.
    { name = "LcdCam", template_params = { default_rst_template = "{{rst_en2_template}}", rst_field = "rst_en_lcdcam" } },
] } }

# HP L2MEM: 0x4FF0_0000 - 0x4FFC_0000 (768 KB)
# ROM bootloader reserves 0x4FF0_0000 - 0x4FF4_0000 (256 KB)
# dram: usable application RAM (after ROM reserved region)
# dram2_uninit: ROM reserved area, reclaimable after 2nd-stage bootloader
memory_map = { ranges = [
    { name = "dram", start = 0x4FF4_0000, end = 0x4FFC_0000 },
    { name = "dram2_uninit", start = 0x4FF0_0000, end = 0x4FF4_0000 },
] }

peripherals = [
    # Minimal set for esp-hal compilation
    { name = "EFUSE", hidden = true },
    { name = "GPIO" },
    { name = "SYSTEM", pac = "HP_SYS" },
    { name = "HP_SYS" },
    { name = "HP_SYS_CLKRST" },
    { name = "RNG", pac = "LP_SYS" },
    { name = "INTERRUPT_CORE0" },
    { name = "INTERRUPT_CORE1" },
    { name = "LP_I2C_ANA_MST" },
    { name = "CLIC" },
    { name = "IO_MUX" },
    # LP_AON / LPWR: compatibility aliases -- other chips expose an `LP_AON`
    # (and the `LPWR` alias) register block; on P4 the same registers live in
    # `LP_SYS` in the PAC, so we point the esp-hal `LP_AON` / `LPWR` singletons
    # at the `LP_SYS` PAC type.
    { name = "LP_AON", pac = "LP_SYS" },
    { name = "LP_AON_CLKRST" },
    { name = "LP_SYS" },
    { name = "LP_WDT" },
    { name = "LPWR", pac = "LP_SYS" },
    { name = "PMU" },
    { name = "SYSTIMER" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "TIMG1", clock_group = "TIMG" },
    { name = "UART0", interrupts = { peri = "UART0" }, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, clock_group = "UART" },
    { name = "UART2", interrupts = { peri = "UART2" }, clock_group = "UART" },
    { name = "UART3", interrupts = { peri = "UART3" }, clock_group = "UART" },
    { name = "UART4", interrupts = { peri = "UART4" }, clock_group = "UART" },
    { name = "SPI2", interrupts = { peri = "SPI2" }, dma_peripheral = 1 },
    # SPI3 has the same RegisterBlock layout as SPI2 but the PAC exposes it as
    # a distinct type. Map to SPI2 so the SPI master driver can reuse its
    # register accessors directly. Verified field-compatible against the
    # upstream esp32p4 PAC at the time of this port.
