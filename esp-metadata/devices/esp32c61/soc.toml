# ESP32-C61 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32c61"
arch   = "riscv"
target = "riscv32imac-unknown-none-elf"
cores  = 1
datasheet = "https://www.espressif.com/sites/default/files/documentation/esp32-c61_datasheet_en.pdf"
trm    = "https://www.espressif.com/sites/default/files/documentation/esp32-c61_technical_reference_manual_en.pdf"

[device.rom]
has_crc_le  = true
has_crc_be  = true
has_md5_bsd = true

[device.soc]
cpu_has_branch_predictor = true
cpu_has_csr_pc = false
cpu_csr_prv_mode = 0x810

has_swd_watchdog = true

memory_map = { ranges = [
    { name = "dram", start = 0x4080_0000, end = 0x4085_0000 },
    # start address from correct bootloader commit: https://github.com/espressif/esp-idf/blob/d66ebb8/components/bootloader/subproject/main/ld/esp32c61/bootloader.ld#L32
    { name = "dram2_uninit", start = 0x4083_EA70, end = 0x4084_EA70 },
] }

peripherals = [
    # { name = "APB_SARADC" },
    # { name = "AVC" },
    { name = "ASSIST_DEBUG"},
    { name = "CLINT" },
    { name = "CACHE" },
    # { name = "CPU_APM" }, # TODO: verify we need it
    { name = "DMA" },
    { name = "ECC" },
    { name = "ECDSA" },
    { name = "EFUSE" },
    { name = "ETM", pac = "SOC_ETM" },
    { name = "GPIO" },
    { name = "GPIO_SD", pac = "GPIO_EXT" },
    # { name = "HINF" }, # TODO: add PAC manually later
    { name = "HP_APM" },
    { name = "HP_SYS" },
    { name = "I2C_ANA_MST" },
    { name = "I2C0", interrupts = { peri = "I2C_EXT0" }, stable = true, clock_group = "I2C" },
    { name = "I2S0", interrupts = { peri = "I2S0" } },
    # { name = "IEEE802154" }, # TODO: add PAC manually later
    { name = "INTERRUPT_CORE0" },
    { name = "INTPRI" },
    { name = "IO_MUX" },
    # { name = "LEDC" }, # TODO: define later
    { name = "LP_ANA" },
    { name = "LP_AON" },
    { name = "LP_APM" },
    { name = "LP_CLKRST" },
    { name = "LPWR", pac = "LP_CLKRST" },
    { name = "LP_GPIO" },
    # { name = "LP_I2C0" },
    { name = "LP_IO_MUX" },
    { name = "LP_PERI", pac = "LPPERI" },
    { name = "LP_TEE" },
    { name = "RTC_TIMER", pac = "LP_TIMER" },
    { name = "LP_WDT" },
    { name = "MEM_MONITOR" },
    { name = "MODEM_LPCON" },
    { name = "MODEM_SYSCON" },
    # { name = "OTP_DEBUG" },
    { name = "PAU" },
    { name = "PCR" },
    { name = "PMU" },
    { name = "RNG", pac = "LPPERI" },
    { name = "SHA", interrupts = { peri = "SHA" } },
    { name = "SLC" },
    # { name = "SLCHOST" }, TODO: add PAC manually later
    { name = "SPI0" },
    { name = "SPI1" },
    { name = "SPI2", interrupts = { peri = "SPI2" }, stable = true, clock_group = "SPI" },
    { name = "SYSTEM", pac = "PCR" },
    { name = "SYSTIMER" },
    { name = "TEE" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "TIMG1", clock_group = "TIMG" },
    # { name = "TRACE0", pac = "TRACE" },
    { name = "UART0", interrupts = { peri = "UART0" }, stable = true, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, stable = true, clock_group = "UART" },
    { name = "USB_DEVICE", interrupts = { peri = "USB_DEVICE" } },

    { name = "BT", virtual = true, interrupts = { mac = "BT_MAC", lp_timer = "LP_TIMER" } },
    { name = "FLASH", virtual = true },
    { name = "GPIO_DEDICATED", virtual = true },
    { name = "LP_CORE", virtual = true },
    { name = "SW_INTERRUPT", virtual = true },
    { name = "WIFI", virtual = true, interrupts = { bb = "WIFI_BB", mac = "WIFI_MAC", pwr = "WIFI_PWR" }, stable = true  },
    { name = "PSRAM", virtual = true },
]

[device.soc.clocks]
# {include clocks.toml}

[device.adc]
support_status = { status = "not_supported", issue = 5422 }

[device.interrupts]
support_status = "partial"
status_registers = 3
software_interrupt_count = 4
controller = { Riscv = { flavour = "clic", interrupts = 32, priority_levels = 8 } }

[device.timergroup]
support_status = "partial"
instances = [{ name = "timg0" }, { name = "timg1" }]
timg_has_divcnt_rst = true
rc_fast_calibration = { divider = 32, min_rev = 0 }

[device.lp_io]
support_status = "partial"
version = "v4"

[device.gpio]
support_status = "supported"
# {include gpio.toml}

[device.dedicated_gpio]
version = "riscv_v1"
support_status = "partial"
channels = [["CPU_GPIO_0", "CPU_GPIO_1", "CPU_GPIO_2", "CPU_GPIO_3", "CPU_GPIO_4", "CPU_GPIO_5", "CPU_GPIO_6", "CPU_GPIO_7"]]

[device.dma]
support_status = "partial"
gdma_version = 2
separate_in_out_interrupts = true
# TODO: DMA can access flash
# TODO: weight-based arbitration
engines = [
    {
        name = "AHB_GDMA",
        max_priority = 5,
        burst_sizes = [4, 16, 32],
        drivers = ["sha", "spi_master", "i2s"],
        peripheral_instances = [
            { name = "SPI2", dma_id = 1 },
            { name = "I2S0", dma_id = 3 },
            { name = "SHA",  dma_id = 7 },
        ],
        channels = [
            { name = "DMA_CH0", mem2mem = true, mem2mem_id = 4, interrupt_in = "DMA_IN_CH0", interrupt_out = "DMA_OUT_CH0" },
            { name = "DMA_CH1", mem2mem = true, mem2mem_id = 5, interrupt_in = "DMA_IN_CH1", interrupt_out = "DMA_OUT_CH1" },
        ]
    },
]

[device.ecc]
support_status = "partial"
working_modes = [
    { id = 0, mode = "affine_point_multiplication" },
    { id = 2, mode = "affine_point_verification" },
    { id = 3, mode = "affine_point_verification_and_multiplication" },
    { id = 4, mode = "jacobian_point_multiplication" },
    { id = 5, mode = "affine_point_addition" },
    { id = 6, mode = "jacobian_point_verification" },
    { id = 7, mode = "affine_point_verification_and_jacobian_point_multiplication" },
    { id = 8, mode = "modular_addition" },
    { id = 9, mode = "modular_subtraction" },
    { id = 10, mode = "modular_multiplication" },
    { id = 11, mode = "modular_division" }
]
curves = [
    { id = 0, curve = 192 },
    { id = 1, curve = 256 }
]
separate_jacobian_point_memory = true
has_memory_clock_gate = true
supports_enhanced_security = true
zero_extend_writes = true

[device.systimer]
[device.usb_serial_jtag]

[device.ledc]
version = 3
channel_count = 6
support_status = { status = "not_supported", issue = 5418 }

[device.etm]
support_status = { status = "not_supported", issue = 5419 }

[device.lp_timer]

[device.sleep]
support_status = "partial"
light_sleep = true
deep_sleep = true
wakeup_sources = {
    Ext1 = 1,
    Gpio = 2,
    WifiBeacon = 3,
    Timer = 4,
    Wifi = 5,
    Uart0 = 6,
    Uart1 = 7,
    Sdio = 8,
    Bt = 10,
    LpCore = 11,
    Usb = 14,
}

[device.rng]
support_status = "partial"
trng_supported = false  # TODO
apb_cycle_wait_num = 16 # TODO
is_lp_sys = true

[device.uart]
support_status = "supported"
instances = [
    { name = "uart0", sys_instance = "Uart0", tx = "U0TXD", rx = "U0RXD", cts = "U0CTS", rts = "U0RTS" },
    { name = "uart1", sys_instance = "Uart1", tx = "U1TXD", rx = "U1RXD", cts = "U1CTS", rts = "U1RTS" },
]
ram_size = 128
version = 2
peripheral_controls_mem_clk = true
has_sclk_enable = true

[device.i2c_master]
support_status = "supported"
version = 3
instances = [
    { name = "i2c0", sys_instance = "I2cExt0", scl = "I2CEXT0_SCL", sda = "I2CEXT0_SDA" },
]
has_fsm_timeouts = true
has_hw_bus_clear = true # I2C_SCL_SP_CONF_REG is present
ll_intr_mask = 0x3ffff
fifo_size = 32
has_bus_timeout_enable = true
max_bus_timeout = 0x1F
can_estimate_nack_reason = true # txfifo_raddr is present
has_conf_update = true
has_reliable_fsm_reset = true
has_arbitration_en = true
has_tx_fifo_watermark = true
bus_timeout_is_exponential = true
has_pd_en = true

[device.i2c_slave]
support_status = { status = "not_supported", issue = 1909 }

[device.psram]
extmem_origin = 0x42000000

[device.sha]
support_status = "partial"
algo = { sha1 = 0, sha224 = 1, sha256 = 2 }

[device.ecdsa]
support_status = { status = "not_supported", issue = 5444 }

[device.spi_master]
support_status = "supported"
dma_can_access_flash = true
version = 3
fifo_size = 64
has_app_interrupts = true
has_dma_segmented_transfer = true
has_clk_pre_div = true
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        sio = ["FSPID", "FSPIQ", "FSPIWP", "FSPIHD"],
        cs = ["FSPICS0", "FSPICS1", "FSPICS2", "FSPICS3", "FSPICS4", "FSPICS5"]
    },
]

[device.spi_slave]
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        mosi = "FSPID",
        miso = "FSPIQ",
        cs = "FSPICS0"
    },
]

[device.assist_debug]
support_status = "partial"
has_sp_monitor = true
has_region_monitor = true

[device.avc]
support_status = { status = "not_supported", issue = 5423 }

[device.io_mux]

[device.i2s]
version = 3
default_clock_source = 2
mclk_divider_bit_width = 9
max_ws_width = 512
clock_configured_by_pcr = true
instances = [
    {
        name = "i2s0",
        sys_instance = "I2s0",
        mclk = "I2S_MCLK",
        bclk = "I2SO_BCK",
        ws = "I2SO_WS",
        bclk_rx = "I2SI_BCK",
        ws_rx = "I2SI_WS",
        dout = ["I2SO_SD"],
        din = ["I2SI_SD"],
        pdm_tx = true,
        pdm_rx = true,
        pcm2pdm = true,
    },
]

[device.sd_slave]
support_status = { status = "not_supported", issue = 5417 }

[device.temp_sensor]
support_status = { status = "not_supported", issue = 5421 }

## Radio
[device.wifi]
support_status = "partial"
has_wifi6 = true
mac_version = 3
csi_supported = true

[device.bt]
support_status = "partial"
controller = "npl"

[device.phy]
support_status = "partial"
combo_module = true
