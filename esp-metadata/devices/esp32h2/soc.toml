# ESP32-H2 Device Metadata
#
# Empty [`device.driver`] tables imply `partial` support status.
#
# If you modify a driver support status, run `cargo xtask update-metadata` to
# update the table in the esp-hal README.

[device]
name   = "esp32h2"
arch   = "riscv"
target = "riscv32imac-unknown-none-elf"
cores  = 1
datasheet = "https://www.espressif.com/sites/default/files/documentation/esp32-h2_datasheet_en.pdf"
trm    = "https://www.espressif.com/sites/default/files/documentation/esp32-h2_technical_reference_manual_en.pdf"

[device.rom]
has_crc_le  = true
has_crc_be  = true
has_md5_bsd = true

[device.soc]
cpu_has_csr_pc = true
cpu_csr_prv_mode = 0xC10

has_swd_watchdog = true

memory_map = { ranges = [
    { name = "dram", start = 0x4080_0000, end = 0x4085_0000 },
    { name = "dram2_uninit", start = 0x4083_EFD0, end = 0x4084_FEE0 },
] }

peripherals = [
    { name = "AES", interrupts = { peri = "AES" } },
    { name = "APB_SARADC" },
    { name = "ASSIST_DEBUG" },
    { name = "DMA" },
    { name = "DS" },
    { name = "ECC" },
    { name = "EFUSE", hidden = true },
    { name = "GPIO" },
    { name = "GPIO_SD" },
    { name = "HMAC" },
    { name = "HP_APM" },
    { name = "HP_SYS" },
    { name = "I2C_ANA_MST" },
    { name = "I2C0", interrupts = { peri = "I2C_EXT0" }, stable = true, clock_group = "I2C" },
    { name = "I2C1", interrupts = { peri = "I2C_EXT1" }, stable = true, clock_group = "I2C" },
    { name = "I2S0", interrupts = { peri = "I2S0" } },
    { name = "IEEE802154", interrupts = { mac = "ZB_MAC" } },
    { name = "INTERRUPT_CORE0" },
    { name = "INTPRI" },
    { name = "IO_MUX" },
    { name = "LEDC" },
    { name = "LPWR", pac = "LP_CLKRST" },
    { name = "LP_ANA" },
    { name = "LP_AON" },
    { name = "LP_APM" },
    { name = "LP_APM0" },
    { name = "LP_CLKRST" },
    { name = "LP_PERI" },
    { name = "RTC_TIMER", pac = "LP_TIMER" },
    { name = "LP_WDT" },
    { name = "MCPWM0", clock_group = "MCPWM" },
    { name = "MEM_MONITOR" },
    { name = "MODEM_LPCON" },
    { name = "MODEM_SYSCON" },
    { name = "OTP_DEBUG" },
    { name = "PARL_IO", interrupts = { tx = "PARL_IO_TX", rx = "PARL_IO_RX" }, clock_group = "PARL_IO" },
    { name = "PAU" },
    { name = "PCNT" },
    { name = "PCR" },
    { name = "PLIC_MX" },
    { name = "PMU" },
    { name = "RMT", clock_group = "RMT" },
    { name = "RNG", virtual = true }, # a) RNG is LP_PERI in truth. b) we need to offset the rng_data register at runtime for newer revisions.
    { name = "RSA", interrupts = { peri = "RSA" } },
    { name = "SHA", interrupts = { peri = "SHA" } },
    { name = "ETM", pac = "SOC_ETM" },
    { name = "SPI0" },
    { name = "SPI1" },
    { name = "SPI2", interrupts = { peri = "SPI2" }, stable = true, clock_group = "SPI" },
    { name = "SYSTEM", pac = "PCR" },
    { name = "SYSTIMER" },
    { name = "TEE" },
    { name = "TIMG0", clock_group = "TIMG" },
    { name = "TIMG1", clock_group = "TIMG" },
    { name = "TRACE0", pac = "TRACE" },
    { name = "TWAI0" },
    { name = "UART0", interrupts = { peri = "UART0" }, stable = true, clock_group = "UART" },
    { name = "UART1", interrupts = { peri = "UART1" }, stable = true, clock_group = "UART" },
    { name = "UHCI0" },
    { name = "USB_DEVICE", interrupts = { peri = "USB_DEVICE" } },

    { name = "ADC1", virtual = true },
    { name = "BT", virtual = true, interrupts = { mac = "BT_MAC", lp_timer = "LP_BLE_TIMER" } },
    { name = "FLASH", virtual = true },
    { name = "GPIO_DEDICATED", virtual = true },
    { name = "SW_INTERRUPT", virtual = true },
]

[device.soc.clocks]
# {include clocks.toml}

[device.adc]
support_status = "partial"
instances = [
    { name = "adc1" },
]

[device.aes]
support_status = "partial"
has_split_text_registers = true
endianness_configurable = false
dma_mode = ["ECB", "CBC", "OFB", "CTR", "CFB8", "CFB128"]
key_length = { options = [
    { bits = 128, encrypt_mode = 0, decrypt_mode = 4 },
    { bits = 256, encrypt_mode = 2, decrypt_mode = 6 }
] }

[device.assist_debug]
support_status = "partial"
has_sp_monitor = true
has_region_monitor = true

[device.dma]
support_status = "partial"
gdma_version = 1
separate_in_out_interrupts = true
engines = [
    {
        name = "AHB_GDMA",
        internal_ram_burst_sizes = [0, 4],
        max_priority = 5,
        drivers = ["aes", "sha", "spi_master", "spi_slave", "uhci", "i2s", "parl_io"],
        peripheral_instances = [
            { name = "SPI2",       dma_id = 0 },
            { name = "UHCI0",      dma_id = 2 },
            { name = "I2S0",       dma_id = 3 },
            { name = "AES",        dma_id = 6 },
            { name = "SHA",        dma_id = 7 },
            { name = "APB_SARADC", dma_id = 8 },
            { name = "PARL_IO",    dma_id = 9 },
        ],
        channels = [
            { name = "DMA_CH0", mem2mem = true, mem2mem_id = 4, interrupt_in = "DMA_IN_CH0", interrupt_out = "DMA_OUT_CH0" },
            { name = "DMA_CH1", mem2mem = true, mem2mem_id = 5, interrupt_in = "DMA_IN_CH1", interrupt_out = "DMA_OUT_CH1" },
            { name = "DMA_CH2", mem2mem = true, mem2mem_id = 10, interrupt_in = "DMA_IN_CH2", interrupt_out = "DMA_OUT_CH2" },
        ]
    },
]

[device.ecc]
support_status = "partial"
working_modes = [
    { id = 0, mode = "affine_point_multiplication" },
    { id = 2, mode = "affine_point_verification" },
    { id = 3, mode = "affine_point_verification_and_multiplication" },
    { id = 4, mode = "jacobian_point_multiplication" },
    { id = 5, mode = "affine_point_addition" },
    { id = 6, mode = "jacobian_point_verification" },
    { id = 7, mode = "affine_point_verification_and_jacobian_point_multiplication" },
    { id = 8, mode = "modular_addition" },
    { id = 9, mode = "modular_subtraction" },
    { id = 10, mode = "modular_multiplication" },
    { id = 11, mode = "modular_division" }
]
curves = [
    { id = 0, curve = 192 },
    { id = 1, curve = 256 }
]
zero_extend_writes = true
separate_jacobian_point_memory = true
has_memory_clock_gate = true
supports_enhanced_security = true # only after revision 1.2

[device.lp_io]
support_status = "partial"
version = "esp32h2"

[device.gpio]
support_status = "supported"
# {include gpio.toml}

[device.dedicated_gpio]
version = "riscv_v1"
support_status = "partial"
channels = [["CPU_GPIO_0", "CPU_GPIO_1", "CPU_GPIO_2", "CPU_GPIO_3", "CPU_GPIO_4", "CPU_GPIO_5", "CPU_GPIO_6", "CPU_GPIO_7"]]

[device.i2c_master]
support_status = "supported"
version = 3
instances = [
    { name = "i2c0", sys_instance = "I2cExt0", scl = "I2CEXT0_SCL", sda = "I2CEXT0_SDA" },
    { name = "i2c1", sys_instance = "I2cExt1", scl = "I2CEXT1_SCL", sda = "I2CEXT1_SDA" },
]
has_fsm_timeouts = true
has_hw_bus_clear = true
ll_intr_mask = 0x3ffff
fifo_size = 32
has_bus_timeout_enable = true
max_bus_timeout = 0x1F
can_estimate_nack_reason = true
has_conf_update = true
has_reliable_fsm_reset = true
has_arbitration_en = true
has_tx_fifo_watermark = true
bus_timeout_is_exponential = true
has_pd_en = true

[device.i2c_slave]
support_status = { status = "not_supported", issue = 1909 }

[device.interrupts]
support_status = "partial"
status_registers = 2
software_interrupt_count = 4
controller = { Riscv = { flavour = "plic", interrupts = 32, priority_levels = 15 } }

[device.rmt]
support_status = "partial"
ram_start = 0x60007400
channel_ram_size = 48
channels = ["Tx", "Tx", "Rx", "Rx"]
has_tx_immediate_stop = true
has_tx_loop_count = true
has_tx_loop_auto_stop = true
has_tx_carrier_data_only = true
has_tx_sync = true
has_rx_wrap = true
has_rx_demodulation = true

[device.rsa]
version = 3
support_status = "partial"
size_increment = 32
memory_size_bytes = 384

[device.sha]
support_status = "partial"
algo = { sha1 = 0, sha224 = 1, sha256 = 2 }

[device.sdm]
support_status = { status = "not_supported", issue = 2370 }

[device.ecdsa]
support_status = { status = "not_supported", issue = 5444 }

[device.spi_master]
version = 3
fifo_size = 64
support_status = "supported"
has_app_interrupts = true
has_dma_segmented_transfer = true
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        sio = ["FSPID", "FSPIQ", "FSPIWP", "FSPIHD"],
        cs = ["FSPICS0", "FSPICS1", "FSPICS2", "FSPICS3", "FSPICS4", "FSPICS5"]
    },
]

[device.spi_slave]
support_status = "partial"
instances = [
    {
        name = "spi2",
        sys_instance = "Spi2",
        sclk = "FSPICLK",
        mosi = "FSPID",
        miso = "FSPIQ",
        cs = "FSPICS0"
    },
]

[device.timergroup]
support_status = "partial"
instances = [{ name = "timg0" }, { name = "timg1" }]
timg_has_divcnt_rst = true
rc_fast_calibration = { divider = 32, min_rev = 2, tick_enable = true }

[device.uart]
support_status = "supported"
instances = [
    { name = "uart0", sys_instance = "Uart0", tx = "U0TXD", rx = "U0RXD", cts = "U0CTS", rts = "U0RTS" },
    { name = "uart1", sys_instance = "Uart1", tx = "U1TXD", rx = "U1RXD", cts = "U1CTS", rts = "U1RTS" },
]
ram_size = 128
version = 2
peripheral_controls_mem_clk = true
has_sclk_enable = true

[device.uhci]
support_status = "partial"

[device.ds]
support_status = { status = "not_supported", issue = 884 }

[device.rng]
support_status = "partial"
trng_supported = true
apb_cycle_wait_num = 16 # TODO

[device.parl_io]
support_status = "partial"
version = 2

[device.sleep]
support_status = "partial"
light_sleep = true
deep_sleep = true
wakeup_sources = {
    Ext1 = 1,
    Gpio = 2,
    WifiBeacon = 3,
    Timer = 4,
    Wifi = 5,
    Uart0 = 6,
    Uart1 = 7,
    Sdio = 8,
    Bt = 10,
    LpCore = 11,
    Usb = 14,
}

# Other drivers which are partially supported but have no other configuration:

## Crypto
[device.hmac]

## Interfaces
[device.i2s]
version = 3
default_clock_source = 1
mclk_divider_bit_width = 9
max_ws_width = 512
clock_configured_by_pcr = true
instances = [
    {
        name = "i2s0",
        sys_instance = "I2s0",
        mclk = "I2S_MCLK",
        bclk = "I2SO_BCK",
        ws = "I2SO_WS",
        bclk_rx = "I2SI_BCK",
        ws_rx = "I2SI_WS",
        dout = ["I2SO_SD"],
        din = ["I2SI_SD"],
        pdm_tx = true,
        pdm_rx = true,
        pcm2pdm = true,
    },
]

[device.ledc]
version = 3
channel_count = 6
[device.mcpwm]
[device.pcnt]
[device.twai]
[device.usb_serial_jtag]

## Miscellaneous
[device.etm]
[device.io_mux]
[device.systimer]
[device.temp_sensor]
[device.lp_timer]

## Radio
[device.bt]
support_status = "partial"
controller = "npl"

[device.ieee802154]

[device.phy]
