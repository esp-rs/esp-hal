[package]
name    = "embassy-usb-hid-host-hs"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
embassy-executor = "0.10.0"
embassy-usb-host = { version = "0.1.0", default-features = false }
esp-backtrace = { path = "../../../esp-backtrace", features = [
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { path = "../../../esp-bootloader-esp-idf" }
esp-hal = { path = "../../../esp-hal", features = ["log-04", "unstable"] }
esp-rtos = { path = "../../../esp-rtos", features = ["embassy", "log-04"] }
esp-println = { path = "../../../esp-println", features = ["log-04"] }
log = "0.4"

[features]
esp32p4 = [
    "esp-backtrace/esp32p4",
    "esp-bootloader-esp-idf/esp32p4",
    "esp-rtos/esp32p4",
    "esp-hal/esp32p4",
]

[profile.release]
debug            = true
debug-assertions = true
lto              = "fat"
codegen-units    = 1

[patch.crates-io]
embassy-usb-synopsys-otg = { git = "https://github.com/bugadani/embassy", rev = "6676033f9" }
embassy-usb-driver = { git = "https://github.com/bugadani/embassy", rev = "6676033f9" }
embassy-executor = { git = "https://github.com/bugadani/embassy", rev = "6676033f9" }
embassy-time = { git = "https://github.com/bugadani/embassy", rev = "6676033f9" }
embassy-time-driver = { git = "https://github.com/bugadani/embassy", rev = "6676033f9" }
embassy-time-queue-utils = { git = "https://github.com/bugadani/embassy", rev = "6676033f9" }
