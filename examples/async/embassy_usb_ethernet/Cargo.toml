[package]
name    = "embassy-usb-ethernet"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
embassy-executor = "0.9.0"
embassy-time = "0.5"
embassy-usb = { version = "0.5.0", default-features = false }
embassy-net = { version = "0.8", default-features = false, features = [
    "proto-ipv4",
    "proto-ipv6",
    "medium-ethernet",
    "tcp",
    "udp",
    "dns",
    "dhcpv4",
] }
esp-backtrace = { path = "../../../esp-backtrace", features = [
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { path = "../../../esp-bootloader-esp-idf" }
esp-hal = { path = "../../../esp-hal", features = ["log-04", "unstable"] }
esp-rtos = { path = "../../../esp-rtos", features = ["embassy", "log-04"] }
esp-println = { path = "../../../esp-println", features = ["log-04"] }
edge-dhcp = "0.7.0"
edge-nal = "0.6.0"
edge-nal-embassy = "0.8.1"
picoserve = { version = "0.18", default-features = false, features = ["embassy"] }
static_cell = "2.1.0"
log = "0.4"

[features]
esp32s2 = [
    "esp-backtrace/esp32s2",
    "esp-bootloader-esp-idf/esp32s2",
    "esp-rtos/esp32s2",
    "esp-hal/esp32s2",
]
esp32s3 = [
    "esp-backtrace/esp32s3",
    "esp-bootloader-esp-idf/esp32s3",
    "esp-rtos/esp32s3",
    "esp-hal/esp32s3",
]

[profile.release]
debug            = true
debug-assertions = true
lto              = "fat"
codegen-units    = 1
