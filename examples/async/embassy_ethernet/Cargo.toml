[package]
name    = "embassy-ethernet"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
embassy-executor = "0.10.0"
embassy-net = { version = "0.9.0", features = [
    "dhcpv4",
    "medium-ethernet",
    "tcp",
    "dns",
] }
embassy-time           = "0.5.0"
esp-alloc              = { path = "../../../esp-alloc" }
esp-backtrace          = { path = "../../../esp-backtrace", features = [
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { path = "../../../esp-bootloader-esp-idf" }
esp-hal = { path = "../../../esp-hal", features = [
    "log-04",
    "unstable",
] }
esp-println = { path = "../../../esp-println", features = ["log-04"] }
esp-rtos    = { path = "../../../esp-rtos", features = ["embassy", "log-04"] }
futures-util = { version = "0.3", default-features = false }
reqwless = { version = "0.14.0", default-features = false }
static_cell = "2.1.0"

[features]
esp32 = [
    "esp-println/esp32",
    "esp-backtrace/esp32",
    "esp-bootloader-esp-idf/esp32",
    "esp-hal/esp32",
    "esp-rtos/esp32",
]

esp32p4 = [
    "esp-println/esp32p4",
    "esp-backtrace/esp32p4",
    "esp-bootloader-esp-idf/esp32p4",
    "esp-hal/esp32p4",
    "esp-rtos/esp32p4",
]
