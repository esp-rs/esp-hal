[package]
name    = "embassy-usb-hid_host"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
embassy-executor = "0.10.0"
embassy-futures = "0.1"
embassy-usb-host = { version = "0.1.0", default-features = false, features = ["defmt"] }
embassy-usb-driver = { version = "0.2.0", default-features = false }
esp-backtrace = { path = "../../../esp-backtrace", features = [
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { path = "../../../esp-bootloader-esp-idf" }
esp-hal = { path = "../../../esp-hal", features = ["defmt", "unstable"] }
esp-rtos = { path = "../../../esp-rtos", features = ["embassy"] }
esp-println = { path = "../../../esp-println", features = ["defmt-espflash"] }
defmt = "1"

[features]
esp32s2 = [
    "esp-backtrace/esp32s2",
    "esp-bootloader-esp-idf/esp32s2",
    "esp-rtos/esp32s2",
    "esp-hal/esp32s2",
]
esp32s3 = [
    "esp-backtrace/esp32s3",
    "esp-bootloader-esp-idf/esp32s3",
    "esp-rtos/esp32s3",
    "esp-hal/esp32s3",
]

[profile.release]
debug            = true
debug-assertions = true
lto              = "fat"
codegen-units    = 1

[patch.crates-io]
embassy-time-driver = { git = "https://github.com/embassy-rs/embassy" }
embassy-time-queue-utils = { git = "https://github.com/embassy-rs/embassy" }
embassy-executor = { git = "https://github.com/embassy-rs/embassy" }
embassy-executor-macros = { git = "https://github.com/embassy-rs/embassy" }
embassy-executor-timer-queue = { git = "https://github.com/embassy-rs/embassy" }
embassy-time = { git = "https://github.com/embassy-rs/embassy" }
embassy-usb-host = { git = "https://github.com/embassy-rs/embassy" }
embassy-usb-driver = { git = "https://github.com/embassy-rs/embassy" }
embassy-usb-synopsys-otg = { git = "https://github.com/embassy-rs/embassy" }
