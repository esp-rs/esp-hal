[package]
name    = "embassy-twt-udp"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
embassy-executor = "0.10.0"
embassy-net = { version = "0.9.0", features = [
    "dhcpv4",
    "medium-ethernet",
    "udp",
] }
embassy-time = "0.5.0"
esp-alloc = { path = "../../../esp-alloc" }
esp-backtrace = { path = "../../../esp-backtrace", features = [
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { path = "../../../esp-bootloader-esp-idf" }
esp-hal = { path = "../../../esp-hal", features = ["log-04", "unstable"] }
esp-println = { path = "../../../esp-println", features = ["log-04"] }
esp-rtos = { path = "../../../esp-rtos", features = ["esp-radio", "embassy", "log-04"] }
esp-radio = { path = "../../../esp-radio", features = [
    "log-04",
    "wifi",
    "unstable",
] }
static_cell = "2.1.0"

[features]
esp32c5 = [
    "esp-backtrace/esp32c5",
    "esp-bootloader-esp-idf/esp32c5",
    "esp-hal/esp32c5",
    "esp-rtos/esp32c5",
    "esp-radio/esp32c5",
]
esp32c6 = [
    "esp-backtrace/esp32c6",
    "esp-bootloader-esp-idf/esp32c6",
    "esp-hal/esp32c6",
    "esp-rtos/esp32c6",
    "esp-radio/esp32c6",
]
esp32c61 = [
    "esp-backtrace/esp32c61",
    "esp-bootloader-esp-idf/esp32c61",
    "esp-hal/esp32c61",
    "esp-rtos/esp32c61",
    "esp-radio/esp32c61",
]

[profile.release]
debug            = true
debug-assertions = true
lto              = "fat"
codegen-units    = 1
