[package]
name    = "ble_1-1"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
embassy-executor = "0.10.0"
embassy-futures = "0.1"
embassy-sync = "0.7"
embassy-time = "0.5.0"
esp-alloc = { version = "0.10.0" }
esp-backtrace = { version = "0.19.0", features = [
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { version = "0.5.0" }
esp-hal = { version = "1.1.0", features = ["log-04", "unstable"] }
esp-println = { version = "0.17.0", features = ["log-04"] }
esp-rtos = { version = "0.3.0", features = ["esp-radio", "embassy", "log-04"] }
esp-radio = { version = "0.18.0", features = [
    "ble",
    "log-04",
    "unstable",
] }
log = "0.4.27"
trouble-host = { version = "0.6.0", features = [
    "default-packet-pool-mtu-255",
    "derive",
    "scan",
] }
static_cell = "2.1.1"

[features]
esp32 = [
    "esp-backtrace/esp32",
    "esp-bootloader-esp-idf/esp32",
    "esp-hal/esp32",
    "esp-rtos/esp32",
    "esp-radio/esp32",
]
esp32c2 = [
    "esp-backtrace/esp32c2",
    "esp-bootloader-esp-idf/esp32c2",
    "esp-hal/esp32c2",
    "esp-rtos/esp32c2",
    "esp-radio/esp32c2",
]
esp32c3 = [
    "esp-backtrace/esp32c3",
    "esp-bootloader-esp-idf/esp32c3",
    "esp-hal/esp32c3",
    "esp-rtos/esp32c3",
    "esp-radio/esp32c3",
]
esp32c5 = [
    "esp-backtrace/esp32c5",
    "esp-bootloader-esp-idf/esp32c5",
    "esp-hal/esp32c5",
    "esp-rtos/esp32c5",
    "esp-radio/esp32c5",
]
esp32c6 = [
    "esp-backtrace/esp32c6",
    "esp-bootloader-esp-idf/esp32c6",
    "esp-hal/esp32c6",
    "esp-rtos/esp32c6",
    "esp-radio/esp32c6",
]
esp32c61 = [
    "esp-backtrace/esp32c61",
    "esp-bootloader-esp-idf/esp32c61",
    "esp-hal/esp32c61",
    "esp-rtos/esp32c61",
    "esp-radio/esp32c61",
]
esp32h2 = [
    "esp-backtrace/esp32h2",
    "esp-bootloader-esp-idf/esp32h2",
    "esp-hal/esp32h2",
    "esp-rtos/esp32h2",
    "esp-radio/esp32h2",
]
esp32s3 = [
    "esp-backtrace/esp32s3",
    "esp-bootloader-esp-idf/esp32s3",
    "esp-hal/esp32s3",
    "esp-rtos/esp32s3",
    "esp-radio/esp32s3",
]

[profile.release]
debug            = true
debug-assertions = true
lto              = "fat"
codegen-units    = 1

[package.metadata.cargo-machete]
# static_cell is used indirectly in #[gatt_service] macro.
ignored = ["embassy-sync", "static_cell"]
