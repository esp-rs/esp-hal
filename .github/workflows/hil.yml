name: HIL

run-name: >
  ${{ inputs.pr_number != '' &&
      format(
        'HIL for PR #{0} ({1}{2})',
        inputs.pr_number,
        inputs.chips,
        inputs.tests != '' && format('; tests: {0}', inputs.tests) || ''
      ) ||

      format(
        'HIL ({0}{1})',
        inputs.chips,
        inputs.tests != '' && format('; tests: {0}', inputs.tests) || ''
      )
  }}

on:
  workflow_call:
    inputs:
      chips:
        description: "Space-separated list of SoCs to build and test"
        required: true
        type: string
      tests:
        description: "Optional list of test names to run (ELF basenames)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      repository:
        description: "Owner and repository to test"
        required: true
        default: "esp-rs/esp-hal"
      branch:
        description: "Branch, tag or SHA to checkout."
        required: true
        default: "main"
      pr_number:
        description: "Pull request number (for slash-triggered runs)"
        required: false
        default: ""
      chips:
        description: "Space-separated list of SoCs to build and test"
        required: true
        default: "esp32 esp32s2 esp32s3 esp32c2 esp32c3 esp32c5 esp32c6 esp32c61 esp32h2 esp32p4"
      tests:
        description: "Optional list of test names to run (ELF basenames)"
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.chips.outputs.matrix }}
    steps:
      - name: Resolve chip matrix
        id: chips
        run: |
          ALL_CHIPS='[
            {"soc":"esp32",   "rust-target":"xtensa-esp32-none-elf",        "runner":"esp32-jtag",   "host":"aarch64"},
            {"soc":"esp32s2", "rust-target":"xtensa-esp32s2-none-elf",      "runner":"esp32s2-jtag", "host":"armv7"},
            {"soc":"esp32s3", "rust-target":"xtensa-esp32s3-none-elf",      "runner":"esp32s3-usb",  "host":"armv7"},
            {"soc":"esp32c2", "rust-target":"riscv32imc-unknown-none-elf",  "runner":"esp32c2-jtag", "host":"aarch64"},
            {"soc":"esp32c3", "rust-target":"riscv32imc-unknown-none-elf",  "runner":"esp32c3-usb",  "host":"armv7"},
            {"soc":"esp32c5", "rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32c5-usb",  "host":"aarch64"},
            {"soc":"esp32c6", "rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32c6-usb",  "host":"armv7"},
            {"soc":"esp32c61","rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32c61-usb", "host":"aarch64"},
            {"soc":"esp32h2", "rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32h2-usb",  "host":"armv7"},
            {"soc":"esp32p4", "rust-target":"riscv32imafc-unknown-none-elf","runner":"esp32p4",      "host":"aarch64"}
          ]'

          REQUESTED="${{ inputs.chips }}"
          MATRIX=$(echo "$ALL_CHIPS" | jq -c --arg chips "$REQUESTED" \
            '[.[] | select(.soc as $s | $chips | split(" ") | index($s))]')

          if [ "$(echo "$MATRIX" | jq 'length')" -eq 0 ]; then
            echo "::error::No valid chips selected from input: '$REQUESTED'"
            exit 1
          fi

          echo "matrix={\"target\":$(echo "$MATRIX" | jq -c .)}" >> "$GITHUB_OUTPUT"
          echo "Selected chips: $(echo "$MATRIX" | jq -r '.[].soc' | tr '\n' ' ')"

      - name: Determine required architectures
        id: arch
        run: |
          NEED_XTENSA=false
          NEED_RISCV=false
          for chip in ${{ inputs.chips }}; do
            case $chip in
              esp32|esp32s2|esp32s3) NEED_XTENSA=true ;;
              *) NEED_RISCV=true ;;
            esac
          done
          echo "xtensa=$NEED_XTENSA" >> "$GITHUB_OUTPUT"
          echo "riscv=$NEED_RISCV" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: github.event_name != 'workflow_dispatch'
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ github.event.inputs.repository }}
          ref: ${{ github.event.inputs.branch }}

      - uses: esp-rs/xtensa-toolchain@v1.6
        if: steps.arch.outputs.xtensa == 'true'
        with:
          buildtargets: esp32,esp32s2,esp32s3
          default: true
          version: 1.96.0.0

      - uses: dtolnay/rust-toolchain@v1
        if: steps.arch.outputs.riscv == 'true'
        with:
          target: riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf,riscv32imafc-unknown-none-elf
          toolchain: nightly
          components: rust-src

      # Cross-compile xtask for HIL runners
      - name: Install cross-compilation targets
        run: |
          rustup target add aarch64-unknown-linux-gnu
          rustup target add armv7-unknown-linux-gnueabihf

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build xtask for HIL runners
        run: |
          cross build --release --target armv7-unknown-linux-gnueabihf -p xtask
          cross build --release --target aarch64-unknown-linux-gnu -p xtask

      - name: Upload xtask artifacts
        uses: actions/upload-artifact@v6
        with:
          name: xtask-armv7
          path: target/armv7-unknown-linux-gnueabihf/release/xtask

      - uses: actions/upload-artifact@v6
        with:
          name: xtask-aarch64
          path: target/aarch64-unknown-linux-gnu/release/xtask

      # Build test ELFs for each requested chip
      - name: Build tests
        run: |
          CHIPS=$(echo '${{ steps.chips.outputs.matrix }}' | jq -r '.target[].soc')
          TESTS="${{ inputs.tests }}"
          for chip in $CHIPS; do
            if ! cargo xtask build tests "$chip" --help >/dev/null 2>&1; then
              echo "Skipping $chip: not supported by this ref's xtask"
              continue
            fi
            if [ -n "$TESTS" ]; then
              echo "Building selected tests for $chip: $TESTS"
              cargo xtask build tests "$chip" --tests "$TESTS"
            else
              echo "Building ALL tests for $chip"
              cargo xtask build tests "$chip"
            fi
          done

      - name: Upload test artifacts
        uses: actions/upload-artifact@v6
        with:
          name: hil-tests
          path: target/tests/
          if-no-files-found: warn

  hil:
    needs: build
    runs-on:
      labels: [self-hosted, "${{ matrix.target.runner }}"]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hil-tests
          path: tests/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: xtask-${{ matrix.target.host }}

      - name: Skip if this target wasn't built
        id: guard
        run: |
          if [ ! -d "tests/${{ matrix.target.soc }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No tests for ${{ matrix.target.soc }} in this run; skipping."
          fi

      - name: Compute tests arg
        if: steps.guard.outputs.skip != 'true'
        id: tests
        run: |
          if [ -n "${{ inputs.tests }}" ]; then
            echo "value=--elfs ${{ inputs.tests }}" >> $GITHUB_OUTPUT
          else
            echo "value=" >> $GITHUB_OUTPUT
          fi

      - name: Run Tests
        if: steps.guard.outputs.skip != 'true'
        id: run-tests
        run: |
          [ -f ~/setup.sh ] && source ~/setup.sh

          export PATH=$PATH:/home/espressif/.cargo/bin
          chmod +x xtask
          ./xtask run elfs ${{ matrix.target.soc }} tests/${{ matrix.target.soc }} ${{ steps.tests.outputs.value }}

      - name: Clean up
        if: always()
        run: |
          rm -rf tests/ || true
          rm -f xtask || true
