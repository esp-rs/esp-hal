# NOTE:
#
# When adding support for a new chip to `esp-hal`, there are a number of
# updates which must be made to the CI workflow in order to reflect this; the
# changes are:
#
# 1.) In the 'esp-hal' job, add the appropriate build command.
# 1a.) If the device has a low-power core (which is supported in
#      `esp-lp-hal`), then update the `if` condition to build prerequisites.
# 2.) In the 'msrv' job, add checks as needed for the new chip.

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MSRV: "1.95.0"
  DEFMT_LOG: trace

# Cancel any currently running workflows from the same PR, branch, or
# tag when a new workflow is triggered.
#
# https://stackoverflow.com/a/66336834
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  # Centralized entry point — fetches labels once, decides which downstream
  # jobs and reusable workflows run.  Every other job/workflow in this file
  # gates on `calculate` outputs.
  calculate:
    runs-on: ubuntu-latest
    outputs:
      labels: ${{ steps.labels.outputs.labels }}
      packages: ${{ steps.labels.outputs.packages }}
      run-build: ${{ steps.decide.outputs.run-build }}
      run-docs: ${{ steps.decide.outputs.run-docs }}
      run-msrv: ${{ steps.decide.outputs.run-msrv }}
      run-host-tests: ${{ steps.decide.outputs.run-host-tests }}
      run-hil: ${{ steps.decide.outputs.run-hil }}
      run-changelog: ${{ steps.decide.outputs.run-changelog }}
      run-semver-check: ${{ steps.decide.outputs.run-semver-check }}
    steps:
      - uses: actions/checkout@v6

      - name: Get labels
        id: labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_target" ]]; then
            LABELS=$(printf "%b" "${{ join(github.event.pull_request.labels.*.name, '\n') }}")
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            COMMIT_MSG=$(git log -1 --pretty=%B)
            PR_NUMBER=$(echo "$COMMIT_MSG" | grep -o "#[0-9]*" | grep -o "[0-9]*" || true)
            if [ -n "$PR_NUMBER" ]; then
              LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || true)
            fi
          fi

          PACKAGES=""
          if [ -n "$LABELS" ]; then
            PACKAGES=$(echo "$LABELS" \
              | grep -oP '(?<=^breaking-change-)[a-z0-9-]+$' || true \
              | tr '\n' ',' \
              | sed 's/,$//')
          fi

          LABELS_SPACE=$(echo "$LABELS" | tr '\n' ' ' | xargs)
          PACKAGES_SPACE=$(echo "$PACKAGES" | tr ',' ' ')

          echo "labels=$LABELS_SPACE" >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES_SPACE" >> "$GITHUB_OUTPUT"

          echo "Detected labels: $LABELS_SPACE"
          echo "Detected packages: $PACKAGES_SPACE"

      - name: Decide what to run
        id: decide
        env:
          LABELS: ${{ steps.labels.outputs.labels }}
        run: |
          BUILD=true; DOCS=true; MSRV=true; HOST=true
          HIL=true; CHANGELOG=true; SEMVER=true

          # `skip-ci-non-code-change` only skips building/testing; API checks (semver) still run.
          # Use the dedicated `skip-semver-checks` label to skip semver checks.
          if echo "$LABELS" | grep -qw 'skip-ci-non-code-change'; then
            BUILD=false; DOCS=false; MSRV=false; HOST=false
            HIL=false
          fi
          if echo "$LABELS" | grep -qw 'skip-semver-checks'; then SEMVER=false; fi
          if echo "$LABELS" | grep -qw 'skip-changelog'; then CHANGELOG=false; fi

          for pair in \
            "run-build=$BUILD" \
            "run-docs=$DOCS" \
            "run-msrv=$MSRV" \
            "run-host-tests=$HOST" \
            "run-hil=$HIL" \
            "run-changelog=$CHANGELOG" \
            "run-semver-check=$SEMVER"; do
            echo "$pair" >> "$GITHUB_OUTPUT"
          done

          echo "Decision: build=$BUILD docs=$DOCS msrv=$MSRV host=$HOST hil=$HIL changelog=$CHANGELOG semver=$SEMVER"

  # --------------------------------------------------------------------------
  # Build Packages
  esp-hal:
    needs: calculate
    if: needs.calculate.outputs.run-build == 'true'
    runs-on: macos-m1-self-hosted
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      CI: 1
      SSID: SSID
      PASSWORD: PASSWORD
      STATIC_IP: 1.1.1.1
      GATEWAY_IP: 1.1.1.1
      HOST_IP: 1.1.1.1

    strategy:
      matrix:
        # load-blance runners a bit
        group:
          - chips: [esp32, esp32s2, esp32s3, esp32c2, esp32c3]
            toolchain: esp
          - chips: [esp32c5, esp32c6, esp32c61, esp32h2, esp32p4]
            toolchain: stable

    steps:
      - uses: actions/checkout@v6

      # Install the Rust toolchain for Xtensa devices:
      - uses: esp-rs/xtensa-toolchain@v1.6
        if: matrix.group.toolchain == 'esp'
        with:
          version: 1.96.0.0

      # Install the Rust stable toolchain for RISC-V devices:
      - uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf,riscv32imafc-unknown-none-elf
          toolchain: stable
          components: rust-src

      - name: Setup cargo-batch
        run: |
          if ! command -v cargo-batch &> /dev/null; then
              cargo install --git https://github.com/embassy-rs/cargo-batch cargo --bin cargo-batch --locked --force
          fi

      - name: Build and Check
        shell: bash
        env:
          CHIPS: ${{ join(matrix.group.chips, ' ') }}
          TOOLCHAIN: ${{ matrix.group.toolchain }}
        run: |
          # lints and docs are checked separately
          for chip in $CHIPS; do
            cargo xcheck ci "$chip" --toolchain "$TOOLCHAIN" --no-lint --no-docs
          done

  docs:
    needs: calculate
    if: needs.calculate.outputs.run-docs == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        group:
          - xtensa
          - riscv

    steps:
      - uses: actions/checkout@v6

      # Install the Rust toolchain for Xtensa devices:
      - uses: esp-rs/xtensa-toolchain@v1.6
        with:
          version: 1.95.0.0

      # Install the Rust stable toolchain for RISC-V devices:
      - uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf,riscv32imafc-unknown-none-elf
          toolchain: stable
          components: rust-src
      # Install the Rust nightly toolchain for RISC-V devices:
      - uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf,riscv32imafc-unknown-none-elf
          toolchain: nightly
          components: rust-src

      - name: Build Xtensa docs
        if: matrix.group == 'xtensa'
        shell: bash
        run: cargo xtask build documentation --chips esp32,esp32s2,esp32s3

      - name: Build RISC-V docs
        if: matrix.group == 'riscv'
        shell: bash
        run: cargo xtask build documentation --chips esp32c2,esp32c3,esp32c5,esp32c6,esp32c61,esp32h2,esp32p4

      - name: Run Xtensa doc tests
        if: matrix.group == 'xtensa'
        shell: bash
        run: |
          cargo xtask run doc-tests esp32
          cargo xtask run doc-tests esp32s2
          cargo xtask run doc-tests esp32s3

      - name: Run RISC-V doc tests
        if: matrix.group == 'riscv'
        shell: bash
        run: |
          cargo xtask run doc-tests esp32c2
          cargo xtask run doc-tests esp32c3
          cargo xtask run doc-tests esp32c5
          cargo xtask run doc-tests esp32c6
          cargo xtask run doc-tests esp32c61
          cargo xtask run doc-tests esp32h2
          cargo xtask run doc-tests esp32p4

  # --------------------------------------------------------------------------
  # MSRV

  msrv:
    needs: calculate
    if: needs.calculate.outputs.run-msrv == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        group:
          - xtensa
          - riscv

    steps:
      - uses: actions/checkout@v6

      - uses: esp-rs/xtensa-toolchain@v1.6
        if: matrix.group == 'xtensa'
        with:
          version: ${{ env.MSRV }}

      - name: esp toolchain checks
        if: matrix.group == 'xtensa'
        run: rustc +esp --version --verbose

      - uses: dtolnay/rust-toolchain@v1
        if: matrix.group == 'riscv'
        with:
          target: riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf,riscv32imafc-unknown-none-elf,x86_64-unknown-linux-gnu
          toolchain: ${{ env.MSRV }}
          components: rust-src,clippy

      - name: Stable toolchain checks
        if: matrix.group == 'riscv'
        run: rustc +${{ env.MSRV }} --version --verbose

      # Verify the MSRV for all chips by running a lint session
      - name: msrv RISC-V (esp-hal)
        if: matrix.group == 'riscv'
        run: |
          cargo xtask lint-packages --chips esp32c2,esp32c3,esp32c5,esp32c6,esp32c61,esp32h2,esp32p4 --toolchain ${{ env.MSRV }}

      - name: msrv Xtensa (esp-hal)
        if: matrix.group == 'xtensa'
        run: |
          cargo xtask lint-packages --chips esp32,esp32s2,esp32s3 --toolchain esp

  # --------------------------------------------------------------------------
  # host tests

  host-tests:
    needs: calculate
    if: needs.calculate.outputs.run-host-tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Some of the configuration items in 'rustfmt.toml' require the 'nightly'
      # release channel, MIRI is only available in nightly
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt,miri

      # Run xtask tests
      - name: Run xtask tests
        run: cd xtask && cargo test --features release

      # Check the formatting of all packages:
      - run: cargo xtask fmt-packages --check

      # Check metadata generation for all packages:
      - run: cargo xtask update-metadata --check

      # Enforce esp-rom-sys dependency requirement policy:
      - run: cargo xrel-check check-rom-sys-policy

      # Run host tests for all applicable packages:
      - run: cargo xtask host-tests

      # Check for unused dependencies
      - name: Machete
        uses: bnjbvr/cargo-machete@main
        with:
          args: >
            esp-alloc
            esp-backtrace
            esp-bootloader-esp-idf
            esp-config
            esp-hal
            esp-hal-procmacros
            esp-lp-hal
            esp-metadata
            esp-phy
            esp-println
            esp-radio
            esp-radio-rtos-driver
            esp-riscv-rt
            esp-rom-sys
            esp-rtos
            esp-storage
            esp-sync
            examples
            extras
            xtask

      # Install dependencies for building the extra crates on ubuntu
      - name: Install dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get -y install musl-tools libudev-dev pkg-config
      # Build the extra crates
      - name: Build the bench-server
        run: cd extras/bench-server && cargo build
      - name: Build esp-wifishark
        run: cd extras/esp-wifishark && cargo build
      - name: Build ieee802154-sniffer
        run: cd extras/ieee802154-sniffer && cargo build

  # --------------------------------------------------------------------------
  # Check links in .rs, .md, and .toml files

  link-check:
    needs: calculate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --format detailed
            --max-concurrency 4
            --retry-wait-time 5
            --max-retries 10
            --accept "200,301,302"
            --exclude-path ".*/target/.*|.*/static\.files/.*|.*/docs/.*"
            --remap "https://github.com/${{ github.repository }}/(?:blob|tree)/[^/]+/(.+) file://$GITHUB_WORKSPACE/\$1"
            './**/*.rs'
            './**/*.md'
            './**/*.toml'

  # --------------------------------------------------------------------------
  # Reusable workflow calls — gated by calculate outputs

  changelog:
    needs: calculate
    if: >
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft &&
      needs.calculate.outputs.run-changelog == 'true'
    uses: ./.github/workflows/changelog.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  semver-check:
    needs: calculate
    if: needs.calculate.outputs.run-semver-check == 'true'
    uses: ./.github/workflows/api-baseline-check.yml
    with:
      packages: ${{ needs.calculate.outputs.packages }}
    secrets: inherit

  # --------------------------------------------------------------------------
  # HIL — hil-build gates compilation; hil-gate gates device runs (≥50% rule).

  hil-build:
    needs: calculate
    if: >
      github.event_name == 'merge_group' &&
      needs.calculate.outputs.run-hil == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.chips.outputs.matrix }}
    steps:
      - name: Resolve chip matrix
        id: chips
        run: |
          ALL_CHIPS='[
            {"soc":"esp32",   "rust-target":"xtensa-esp32-none-elf",        "runner":"esp32-jtag",   "host":"aarch64"},
            {"soc":"esp32s2", "rust-target":"xtensa-esp32s2-none-elf",      "runner":"esp32s2-jtag", "host":"armv7"},
            {"soc":"esp32s3", "rust-target":"xtensa-esp32s3-none-elf",      "runner":"esp32s3-usb",  "host":"armv7"},
            {"soc":"esp32c2", "rust-target":"riscv32imc-unknown-none-elf",  "runner":"esp32c2-jtag", "host":"aarch64"},
            {"soc":"esp32c3", "rust-target":"riscv32imc-unknown-none-elf",  "runner":"esp32c3-usb",  "host":"armv7"},
            {"soc":"esp32c5", "rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32c5-usb",  "host":"aarch64"},
            {"soc":"esp32c6", "rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32c6-usb",  "host":"armv7"},
            {"soc":"esp32c61","rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32c61-usb", "host":"aarch64"},
            {"soc":"esp32h2", "rust-target":"riscv32imac-unknown-none-elf", "runner":"esp32h2-usb",  "host":"armv7"},
            {"soc":"esp32p4", "rust-target":"riscv32imafc-unknown-none-elf","runner":"esp32p4",      "host":"aarch64"}
          ]'
          echo "matrix={\"target\":$(echo "$ALL_CHIPS" | jq -c .)}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: esp-rs/xtensa-toolchain@v1.6
        with:
          buildtargets: esp32,esp32s2,esp32s3
          default: true
          version: 1.96.0.0

      - uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf,riscv32imafc-unknown-none-elf
          toolchain: nightly
          components: rust-src

      - name: Install cross-compilation targets
        run: |
          rustup target add aarch64-unknown-linux-gnu
          rustup target add armv7-unknown-linux-gnueabihf

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build xtask for HIL runners
        run: |
          cross build --release --target armv7-unknown-linux-gnueabihf -p xtask
          cross build --release --target aarch64-unknown-linux-gnu -p xtask

      - uses: actions/upload-artifact@v6
        with:
          name: xtask-armv7
          path: target/armv7-unknown-linux-gnueabihf/release/xtask

      - uses: actions/upload-artifact@v6
        with:
          name: xtask-aarch64
          path: target/aarch64-unknown-linux-gnu/release/xtask

      - name: Build hil-test tests
        run: |
          for chip in esp32 esp32s2 esp32s3 esp32c2 esp32c3 esp32c5 esp32c6 esp32c61 esp32h2 esp32p4; do
            if cargo xtask build tests "$chip" --help >/dev/null 2>&1; then
              echo "Building ALL hil-test tests for $chip"
              cargo xtask build tests "$chip"
            else
              echo "Skipping $chip: not supported by this ref's xtask"
            fi
          done

      - uses: actions/upload-artifact@v6
        with:
          name: hil-tests
          path: target/tests/
          if-no-files-found: error

      # Build radio HIL tests (hil-test-radio).  Chips for which the radio
      # package has no applicable binaries produce no output and are silently
      # skipped via `if-no-files-found: ignore`.
      - name: Reset tests output directory for radio build
        run: rm -rf target/tests

      - name: Build hil-test-radio tests
        run: |
          for chip in esp32 esp32s2 esp32s3 esp32c2 esp32c3 esp32c5 esp32c6 esp32c61 esp32h2; do
            if cargo xtask build tests "$chip" hil-test-radio --help >/dev/null 2>&1; then
              echo "Building ALL hil-test-radio tests for $chip"
              cargo xtask build tests "$chip" hil-test-radio
            else
              echo "Skipping $chip: not supported by this ref's xtask"
            fi
          done

      - uses: actions/upload-artifact@v6
        with:
          name: hil-tests-radio
          path: target/tests/
          if-no-files-found: ignore

  # Device runs — aggregated by hil-gate (see below).
  hil-run:
    needs: hil-build
    runs-on:
      labels: [self-hosted, "${{ matrix.target.runner }}"]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.hil-build.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hil-tests
          path: tests/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: xtask-${{ matrix.target.host }}

      - name: Skip if this target wasn't built
        id: guard
        run: |
          if [ ! -d "tests/${{ matrix.target.soc }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No tests for ${{ matrix.target.soc }} in this run; skipping."
          fi

      - name: Run Tests
        if: steps.guard.outputs.skip != 'true'
        run: |
          [ -f ~/setup.sh ] && source ~/setup.sh

          export PATH=$PATH:/home/espressif/.cargo/bin
          chmod +x xtask
          ./xtask run elfs ${{ matrix.target.soc }} tests/${{ matrix.target.soc }}

      - name: Clean up
        if: always()
        run: |
          rm -rf tests/ || true
          rm -f xtask || true

  # Radio HIL device runs — wifi/BT capable chips on dedicated radio runners.
  # Not gated by hil-gate or ci-result.
  hil-run-radio:
    needs: hil-build
    runs-on:
      labels: [self-hosted, "${{ matrix.target.runner }}"]
    strategy:
      fail-fast: false
      matrix:
        target:
          - soc: esp32c6
            runner: esp32c6-radio
            host: aarch64
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hil-tests-radio
          path: tests/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: xtask-${{ matrix.target.host }}

      - name: Skip if this target wasn't built
        id: guard
        run: |
          if [ ! -d "tests/${{ matrix.target.soc }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No radio tests for ${{ matrix.target.soc }} in this run; skipping."
          fi

      - name: Run Radio Tests
        if: steps.guard.outputs.skip != 'true'
        timeout-minutes: 3
        run: |
          [ -f ~/setup.sh ] && source ~/setup.sh

          export PATH=$PATH:/home/espressif/.cargo/bin
          chmod +x xtask

          espflash board-info

          ./xtask run elfs ${{ matrix.target.soc }} tests/${{ matrix.target.soc }}

      - name: Clean up
        if: always()
        run: |
          rm -rf tests/ || true
          rm -f xtask || true

  # Merge gate for hil-run matrix legs.  Blocks when ≥50% of legs that actually
  # ran tests failed or were cancelled.  Skipped legs (no ELFs for that chip)
  # are excluded.  hil-run-radio is not part of this gate.
  hil-gate:
    needs: [hil-build, hil-run]
    if: >
      always() &&
      needs.hil-build.result == 'success' &&
      needs.hil-run.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Evaluate hil-run results
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateHilGate } = require('./.github/scripts/hil-gate.js');
            await evaluateHilGate({ github, context, core });

  # --------------------------------------------------------------------------
  # Gate job for branch protection
  #
  # Branch protection should require this single job instead of individual jobs.
  # Skipped jobs (due to calculate outputs) are treated as success.
  # Failed or cancelled jobs cause this gate to fail.
  #
  # hil-build gates test compilation.  hil-gate gates device runs when ≥50% of
  # executed hil-run matrix legs fail.  hil-run-radio is informational only.
  ci-result:
    if: ${{ !failure() }}
    needs:
      - esp-hal
      - docs
      - msrv
      - host-tests
      - changelog
      - semver-check
      - hil-build
      - hil-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          for result in $RESULTS; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::One or more CI jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "All CI checks passed (or were correctly skipped)"
