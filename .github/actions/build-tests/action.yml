name: Build HIL tests (composite)
description: Checkout, install toolchains, build tests for a SoC, upload artifact
inputs:
  event_name:
    description: github.event_name
    required: true

  repository:
    description: owner/repo for workflow_dispatch
    required: true

  branch:
    description: branch/tag to checkout if no SHA
    required: true

  soc:
    description: SoC (e.g. esp32c3)
    required: true

  rust_target:
    description: rust target triple
    required: true

  tests:
    description: Optional comma-separated test names
    required: false
    default: ""

  package:
    description: '"hil-test", "hil-test-radio", or "all"'
    required: false
    default: "all"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      if: ${{ inputs.event_name == 'merge_group' }}
    - uses: actions/checkout@v6
      if: ${{ inputs.event_name == 'workflow_dispatch' }}
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.branch }}

    - if: ${{ !contains(fromJson('["esp32","esp32s2","esp32s3"]'), inputs.soc) }}
      uses: dtolnay/rust-toolchain@v1
      with:
        target: ${{ inputs.rust_target }}
        toolchain: stable
        components: rust-src

    - if: ${{ !contains(fromJson('["esp32","esp32s2","esp32s3"]'), inputs.soc) }}
      name: Install nightly Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        target: ${{ inputs.rust_target }}
        toolchain: nightly
        components: rust-src

    - if: ${{ contains(fromJson('["esp32","esp32s2","esp32s3"]'), inputs.soc) }}
      uses: esp-rs/xtensa-toolchain@v1.6
      with:
        buildtargets: ${{ inputs.soc }}
        default: true
        version: 1.95.0.0

    - name: Check if chip is supported by this ref's xtask
      id: chip
      shell: bash
      run: |
        if cargo xtask build tests ${{ inputs.soc }} --help >/dev/null 2>&1; then
          echo "supported=true" >> $GITHUB_OUTPUT
        else
          echo "supported=false" >> $GITHUB_OUTPUT
          echo "Skipping ${{ inputs.soc }}: this ref's xtask does not support it."
        fi

    - name: Build tests
      if: ${{ steps.chip.outputs.supported == 'true' }}
      shell: bash
      env:
        CARGO_TARGET_DIR: ${{ github.workspace }}/target
      run: |
        build_package() {
          local pkg=$1
          if [ -n "${{ inputs.tests }}" ]; then
            cargo xtask build tests ${{ inputs.soc }} $pkg --tests "${{ inputs.tests }}"
          else
            cargo xtask build tests ${{ inputs.soc }} $pkg
          fi

          # Move built files into a subdirectory named after the package
          local src="${{ github.workspace }}/target/tests/${{ inputs.soc }}"
          local dst="${src}/${pkg}"
          mkdir -p "$dst"
          find "$src" -maxdepth 1 -type f -exec mv {} "$dst/" \;
        }

        if [ "${{ inputs.package }}" = "all" ]; then
          build_package hil-test
          build_package hil-test-radio
        else
          build_package "${{ inputs.package }}"
        fi

    - uses: actions/upload-artifact@v6
      if: ${{ steps.chip.outputs.supported == 'true' && inputs.tests == '' && (inputs.package == 'all' || inputs.package == 'hil-test') }}
      with:
        name: tests-${{ inputs.soc }}-hil-test
        path: ${{ github.workspace }}/target/tests/${{ inputs.soc }}/hil-test
        if-no-files-found: error
        overwrite: true

    - uses: actions/upload-artifact@v6
      if: ${{ steps.chip.outputs.supported == 'true' && inputs.tests == '' && (inputs.package == 'all' || inputs.package == 'hil-test-radio') }}
      with:
        name: tests-${{ inputs.soc }}-hil-test-radio
        path: ${{ github.workspace }}/target/tests/${{ inputs.soc }}/hil-test-radio
        if-no-files-found: error
        overwrite: true

    - uses: actions/upload-artifact@v6
      if: ${{ steps.chip.outputs.supported == 'true' && inputs.tests != '' }}
      with:
        name: tests-${{ inputs.soc }}
        path: ${{ github.workspace }}/target/tests/${{ inputs.soc }}
        if-no-files-found: ignore
        overwrite: true
